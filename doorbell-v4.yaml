# Klingel V4 — ESPHome config for the ESP32-C6-WROOM-1 board.
#
# Ported from the V3 doorbell.yaml (ESP32 WROOM-32 dev board). All automation logic is
# preserved verbatim; only the things that change with the new MCU/board were touched:
#
#   1. board/framework  : esp32dev  ->  esp32-c6-devkitc-1  (generic ESP32-C6 board def; fits the WROOM-1)
#   2. logger           : routed to the native USB-Serial-JTAG (GPIO12/GPIO13 = USB D-/D+ on C6)
#   3. GPIO pins remapped to the V4 hardware (C6-WROOM-1 pad assignments differ from C3):
#        House Doorbell    (OC2 / Türruf  sense) : GPIO3  -> GPIO3   (right col pad 26)
#        Apartment Doorbell(OC3 / Etagenruf sense): GPIO1  -> GPIO2   (right col pad 27)
#        front_door_buzzer (K2 / ÖT door opener) : GPIO20 -> GPIO20  (right col pad 18)
#        suppress_sound    (K3 / chime suppress) : GPIO10 -> GPIO22  (right col pad 20)
#   4. *** relay outputs are ACTIVE-HIGH (unchanged from C3 version) ***
#   5. Audio added (ES8311 mono codec, U3; half-duplex PTT via K1; session-sense via OC1):
#        I2C_SDA  (ES8311 control)               : GPIO18            (pad 16)
#        I2C_SCL  (ES8311 control)               : GPIO19            (pad 17)
#        I2S_DIN  (capture, ASDOUT)              : GPIO10            (pad 11)
#        I2S_WS   (LRCK)                         : GPIO0             (pad  8)
#        I2S_MCLK (master clock)                 : GPIO6             (pad  6)
#        I2S_BCLK (bit clock, SCLK)              : GPIO11            (pad 12)
#        K1       (PTT relay, talk=energised)    : GPIO21            (pad 19)
#        I2S_DOUT (DAC / playback, DSDIN)        : GPIO7             (pad  7)
#        OC1      (session-sense, P5↔P2 coil)   : GPIO23            (pad 21)
#   6. Sense disambiguation reworked for the V4 sense points (departs from V3 logic):
#        - OC3 taps the speaker pair (P5↔P1) and pulses at audio rate on ANY loud
#          speaker audio (floor tone, door gong, speech). Its filter chain stretches
#          the half-cycle pulses into a level (delayed_off before delayed_on) and is
#          masked by house_doorbell / session / PTT — see the sensor for details.
#        - OC2 is masked during sessions too, not just board PTT: the resident's own
#          talk button bridges P4↔P2 just like K1 and would fake a house ring.
#
# The api encryption key, OTA password and static IP are kept identical to V3 so the existing
# Home Assistant integration keeps working without re-pairing.

esphome:
  name: doorbell

esp32:
  board: esp32-c6-devkitc-1     # generic ESP32-C6 board def — matches U1 (ESP32-C6-WROOM-1)
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG   # logs over the native USB-C (no UART pins are broken out)

api:
  encryption:
    key: "REDACTED_API_KEY"

web_server:
  port: 80
  ota: false
  local: true

ota:
  platform: esphome
  password: "REDACTED_OTA_PASSWORD"

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: "none"

  manual_ip:
    static_ip: 192.168.3.18
    gateway: 192.168.3.1
    subnet: 255.255.255.0
    dns1: 192.168.3.53

i2c:
  sda: GPIO18              # I2C_SDA — ES8311 (U3) control bus  [C6 pad 16]
  scl: GPIO19              # I2C_SCL — ES8311 (U3) control bus  [C6 pad 17]
  scan: false

i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO0    # I2S_WS / LRCK   [C6 pad 8]
  i2s_bclk_pin: GPIO11    # I2S_BCLK / SCLK [C6 pad 12]
  i2s_mclk_pin: GPIO6     # I2S_MCLK        [C6 pad 6]

audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18          # CE → R20 (10k) → GND on U3 → I2C addr 0x18
    use_microphone: true   # enable the ADC path (analog MIC1P/MIC1N, fed from T1 via C16/C17)
    mic_gain: 0DB          # the PGA cannot attenuate and the line carries speaker-level
                           # audio (gong peaks > 2Vrms full-scale) — keep all the headroom

speaker:
  - platform: i2s_audio
    id: intercom_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_codec
    i2s_dout_pin: GPIO7    # I2S_DOUT / DSDIN (ESP→codec, playback)  [C6 pad 7]

microphone:
  - platform: i2s_audio
    id: intercom_mic
    i2s_audio_id: i2s_bus
    adc_type: external     # ES8311 does the conversion; ESP only receives I2S
    i2s_din_pin: GPIO10    # I2S_DIN / ASDOUT (codec→ESP, capture)  [C6 pad 11]

# Optional on the C3 (BLE works, but uses resources on the single core). Remove this and
# esp32_ble_tracker if you don't use the Bluetooth proxy.
bluetooth_proxy:
  active: false

esp32_ble_tracker:
  scan_parameters:
    active: False

binary_sensor:
  - platform: gpio
    name: "Apartment Doorbell"
    icon: mdi:doorbell
    id: apartment_doorbell
    pin:
      number: GPIO2            # OC3 collector — Etagenruf (P5) sense   [V3: 32; C3: GPIO1; C6 pad 27]
      inverted: true           # opto pulls the pin LOW when the bell rings
      mode:
        input: true            # R23 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC3 sits across the speaker pair (P5<->P1), so it pulses on ANY loud speaker
      # audio: the Etagenruf tone, the Türruf 3-Klang gong and session speech alike.
      # Only report a floor call when no house ring (gong) and no session/PTT (speech)
      # explains the audio. All masked sources are AC, so the raw input keeps toggling
      # and this filter re-evaluates continuously while masked.
      - lambda: |-
          if (id(house_doorbell).state || id(intercom_session_active).state || id(intercom_ptt).state) return false;
          return x;
      # The tone reaches the opto only on positive half-cycles above the LED threshold,
      # so the raw input toggles at audio rate (~1ms low / ~1.4ms high) — a plain
      # delayed_on can never latch on it. Stretch the conduction pulses into a
      # continuous level first, then require that to persist. 150ms also outlasts
      # house_doorbell's 50ms latch, so a gong that starts together with a house ring
      # cannot beat the mask above.
      - delayed_off: 50ms      # bridge the gaps between tone half-cycles
      - delayed_on: 150ms      # require a sustained tone, and let house_doorbell latch first
      - delayed_off: 2s
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_apartment
  - platform: gpio
    name: "House Doorbell"
    icon: mdi:doorbell
    id: house_doorbell
    pin:
      number: GPIO3            # OC2 collector — Türruf (P4 / IN-P4) sense   [V3: 33; C3: GPIO3; C6 pad 26]
      inverted: true
      mode:
        input: true            # R22 (10k to +3V3) holds it HIGH at idle
    filters:
      # Mask while line 4 can be bridged to P2 — two cases collapse the sense pair:
      #  * board PTT: K1 ties IN_P4 to P2;
      #  * resident talk: during an armed session (OC1 on) the WF26's S2 button plus its
      #    internal relay also tie P4 to P2, so OC2 sees the P1<->P2 standing voltage and
      #    would report a phantom ring.
      # A phantom ring is worse than a missed one here — on_press can pulse the door
      # buzzer (auto-open) — so OC2 stays masked for the whole session. A real ring
      # during a talk bridge is hardware-indistinguishable from the bridge anyway.
      - lambda: |-
          if (id(intercom_ptt).state || id(intercom_session_active).state) return false;
          return x;
      - delayed_on: 50ms
      - delayed_off: 2s
    on_press:
      then:
        if:
          condition:
            binary_sensor.is_on: someone_at_house_door
          then:
            - homeassistant.event:
                event: esphome.doorbell_opened_arrival
            - delay: 1.75s
            - button.press: front_door_buzzer
          else:
            if:
              condition:
                switch.is_on: auto_open_front_door
              then:
                - homeassistant.event:
                    event: esphome.doorbell_opened
                - delay: 1.75s
                - button.press: front_door_buzzer
              else:
                - homeassistant.event:
                    event: esphome.doorbell_not_opened
  - platform: gpio
    name: "Intercom Session"
    icon: mdi:phone-in-talk
    id: intercom_session_active
    pin:
      number: GPIO23        # OC1 collector — session-active sense (P5↔P2 coil)  [C6 pad 21]
      inverted: true
      mode:
        input: true         # R21 (10k to +3V3) holds it HIGH at idle
    filters:
      # Mask while the apartment bell rings: the Etagenruf tone driven onto P5 appears
      # across OC1's sense pair (P5<->P2, via the WF26's coil/C1 network) and would fake a
      # session. The tone is AC, so the raw input keeps toggling and this filter
      # re-evaluates continuously while masked. apartment_doorbell holds for 2s past the
      # tone (delayed_off), which also covers the tail.
      - lambda: |-
          if (id(apartment_doorbell).state) return false;
          return x;
      - delayed_on: 50ms
      - delayed_off: 500ms
  - platform: homeassistant
    id: apartment_occupancy
    entity_id: binary_sensor.apartment_occupancy
  - platform: homeassistant
    id: someone_at_house_door
    entity_id: binary_sensor.someone_at_house_door
  - platform: homeassistant
    id: internet_connection
    entity_id: binary_sensor.fritz_box_7590_connection
  - platform: template
    name: "Doorbell Sound"
    id: doorbell_sound_state
    icon: mdi:music-note
    lambda: |-
      // During an active intercom session K3 must stay energised: it is the prerequisite for the
      // K1 PTT hardware interlock (K3 pole-B is in series with Q1's gate drive). When this sensor
      // does flip on (K3 about to drop), on_press below releases K1 first (10ms guard) so the
      // PTT switch state stays in sync and the K1/K3 release race can't occur.
      if (id(intercom_session_active).state) return false;
      return !id(internet_connection).state || (id(apartment_occupancy).state && !id(someone_at_house_door).state && id(doorbell_sound).state);
    on_press:
      then:
        # Release-order guard (DESIGN.md "Relay release race"): K1 must drop >=10ms before K3.
        # Dropping K3 while K1 is still engaged recloses K3's pole-A NC (~1ms) before K1's
        # armature releases (~1-3ms), momentarily dead-shorting P2<->P3 via the WF26's S2 strap.
        # This sensor's on_press is the ONLY path that de-energises K3, so guarding here covers
        # every case (incl. session end with PTT left on). turn_off via the switch (not the raw
        # output) keeps the HA-visible PTT state in sync; a no-op if K1 was already off.
        - switch.turn_off: intercom_ptt
        - delay: 10ms                                    # > G6K-2F release time (~1-3ms)
        - output.turn_off: suppress_doorbell_sound_bin   # let the chime ring
    on_release:
      then:
        - output.turn_on: suppress_doorbell_sound_bin    # energise K3 -> break P4 -> silence

switch:
  - platform: output
    name: "Intercom PTT"
    icon: mdi:phone-outgoing
    id: intercom_ptt
    output: ptt_relay_bin
    restore_mode: ALWAYS_OFF   # boot into listen/idle (K1 off = NC = P4↔P3)
  - platform: template
    name: "Auto-open front door"
    icon: mdi:gate
    id: auto_open_front_door
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Doorbell Sound"
    icon: mdi:music-note
    id: doorbell_sound
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# *** IMPORTANT — the V4 relay drivers are ACTIVE-HIGH, so these outputs are NOT inverted. ***
# V3 used a SONGLE relay module that energised on a LOW input, so V3 had `inverted: true`.
# V4 drives each coil with a discrete low-side N-MOSFET (2N7002): GPIO HIGH -> FET on -> coil
# energised. So `turn_on` must drive the pin HIGH => no `inverted:` here. Leaving `inverted: true`
# in by mistake would energise BOTH relays at boot (door opener pulsing + chime force-suppressed)
# — exactly what the gate pull-downs are there to prevent. The logical meaning is unchanged from
# V3 (turn_on = relay energised); only the physical polarity flipped.
output:
  - platform: gpio
    pin: GPIO21              # K1 — PTT relay (NO=talk/P4↔P2, NC=listen/idle)  [C6 pad 19]
    id: ptt_relay_bin
  - platform: gpio
    pin: GPIO22              # K3 — chime suppress (break P4)            [V3: 25; C3: GPIO10; C6 pad 20]
    id: suppress_doorbell_sound_bin
  - platform: gpio
    pin: GPIO20              # K2 — front-door buzzer / ÖT (bridge P2+P3) [V3: 26; C6 pad 18]
    id: front_door_buzzer_bin

button:
  - platform: output
    name: "Front Door Buzzer"
    icon: mdi:lock-open-variant
    id: front_door_buzzer
    output: front_door_buzzer_bin
    duration: 1750ms
  - platform: template
    name: "Phone Call"
    icon: mdi:phone
    id: phone_call
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_phone_call
        - button.press: front_door_buzzer
  - platform: template
    name: "Debug Doorbell Opened"
    icon: mdi:bug
    id: debug_doorbell_opened
    entity_category: diagnostic
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_opened

sensor:
  - platform: wifi_signal
    name: WiFi Signal Strength
    update_interval: 60s
