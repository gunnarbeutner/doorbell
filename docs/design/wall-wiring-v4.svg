<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 760" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="760" fill="#ffffff"/>

  <text x="24" y="36" font-size="21" font-weight="bold" fill="#111">Final wall wire-up — WF26 out, Klingel V4 in (Klingel V4, J2)</text>
  <text x="24" y="58" font-size="13" fill="#555">The WF26's terminal NUMBER is the truth; wall-wire colours vary per install. Photograph + fill the table below BEFORE disconnecting.</text>

  <!-- Left: WF26 terminal block -->
  <rect x="40" y="100" width="200" height="300" rx="8" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <text x="140" y="90" font-size="15" font-weight="bold" fill="#111" text-anchor="middle">WF26 (old, in wall)</text>
  <text x="140" y="126" font-size="12" fill="#777" text-anchor="middle">J1 terminal strip — pin N = line N</text>

  <!-- Right: V4 J2 -->
  <rect x="700" y="100" width="200" height="300" rx="8" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <text x="800" y="90" font-size="15" font-weight="bold" fill="#111" text-anchor="middle">Klingel V4 — J2</text>
  <text x="800" y="126" font-size="12" fill="#777" text-anchor="middle">P1 = end screw AWAY from USB-C</text>

  <!-- terminal rows + 1:1 wires -->
  <!-- y positions: 160, 210, 260, 310, 360 -->
  <g font-size="14" fill="#111">
    <!-- row 1 -->
    <rect x="60" y="146" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="74" y="166" text-anchor="middle" font-weight="bold">1</text>
    <line x1="250" y1="160" x2="690" y2="160" stroke="#111111" stroke-width="5"/>
    <rect x="712" y="146" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="726" y="166" text-anchor="middle" font-weight="bold">P1</text>
    <text x="750" y="166" font-size="13">common / GND</text>
    <text x="300" y="152" font-size="12.5" fill="#333">Line 1 — common (scope/DMM reference)</text>
    <!-- row 2 -->
    <rect x="60" y="196" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="74" y="216" text-anchor="middle" font-weight="bold">2</text>
    <line x1="250" y1="210" x2="690" y2="210" stroke="#f9a825" stroke-width="5"/>
    <rect x="712" y="196" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="726" y="216" text-anchor="middle" font-weight="bold">P2</text>
    <text x="750" y="216" font-size="13">listen / supply</text>
    <text x="300" y="202" font-size="12.5" fill="#2e7d32" font-weight="bold">Line 2 — ✓ standing +12 V DC vs line 1, always</text>
    <!-- row 3 -->
    <rect x="60" y="246" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="74" y="266" text-anchor="middle" font-weight="bold">3</text>
    <line x1="250" y1="260" x2="690" y2="260" stroke="#1565c0" stroke-width="5"/>
    <rect x="712" y="246" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="726" y="266" text-anchor="middle" font-weight="bold">P3</text>
    <text x="750" y="266" font-size="13">talk (TX out)</text>
    <text x="300" y="252" font-size="12.5" fill="#333">Line 3 — ~0 V idle, no button response</text>
    <!-- row 4 -->
    <rect x="60" y="296" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="74" y="316" text-anchor="middle" font-weight="bold">4</text>
    <line x1="250" y1="310" x2="690" y2="310" stroke="#757575" stroke-width="5" stroke-dasharray="10 6"/>
    <rect x="712" y="296" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="726" y="316" text-anchor="middle" font-weight="bold">P4</text>
    <text x="750" y="316" font-size="13">Türruf / gong</text>
    <text x="300" y="302" font-size="12.5" fill="#c62828" font-weight="bold">Line 4 — ✓ +12 V pulse ≈1 s on the FRONT-DOOR bell</text>
    <!-- row 5 -->
    <rect x="60" y="346" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="74" y="366" text-anchor="middle" font-weight="bold">5</text>
    <line x1="250" y1="360" x2="690" y2="360" stroke="#9e9e9e" stroke-width="6" stroke-dasharray="10 6"/>
    <line x1="250" y1="360" x2="690" y2="360" stroke="#ffffff" stroke-width="3.5" stroke-dasharray="10 6"/>
    <rect x="712" y="346" width="28" height="28" fill="#ffd54f" stroke="#333" stroke-width="1.5"/>
    <text x="726" y="366" text-anchor="middle" font-weight="bold">P5</text>
    <text x="750" y="366" font-size="13">Etagenruf</text>
    <text x="300" y="352" font-size="12.5" fill="#1565c0" font-weight="bold">Line 5 — ✓ pulsing tone on the FLOOR button</text>
  </g>

  <!-- colour record table -->
  <text x="40" y="440" font-size="14" font-weight="bold" fill="#111">Colour record — read from the install photo, VERIFY each seat at the wall before trusting:</text>
  <g font-size="13" fill="#333">
    <rect x="40" y="452" width="860" height="34" fill="#fafafa" stroke="#999"/>
    <text x="60" y="474">Line 1: black</text>
    <text x="230" y="474">Line 2: yellow</text>
    <text x="400" y="474">Line 3: blue</text>
    <text x="570" y="474">Line 4: white/gray ⚠</text>
    <text x="740" y="474">Line 5: white/gray ⚠</text>
  </g>
  <text x="40" y="502" font-size="12" fill="#c62828">⚠ Lines 4/5 are white and gray, ORDER UNDETERMINED — the one pulsing +12 V on the street bell is line 4; the one with the floor-button tone is line 5.</text>
  <text x="40" y="518" font-size="12" fill="#c62828">⚠ An extra BROWN wire enters the strip at the line-1 (black/common) end — doubled common, 6th terminal, or splice-through? Identify before disconnecting.</text>

  <!-- power feed -->
  <rect x="40" y="528" width="860" height="70" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="56" y="552" font-size="14" font-weight="bold" fill="#8d6e00">Power: wall-wart → USB-A cable → J3 (JST SH-4)</text>
  <text x="56" y="572" font-size="12.5" fill="#6d5a00">Cable build + pinout: docs/design/usb-jst-j3-wiring.svg (verified). NEVER power J1 (USB-C) and J3 at the same time —</text>
  <text x="56" y="588" font-size="12.5" fill="#6d5a00">shared VBUS, no OR-ing. In-field reflash: move J3's far cable end from the wall-wart to a battery-powered laptop.</text>

  <!-- checklist -->
  <g font-size="13" fill="#333">
    <text x="40" y="632" font-size="14" font-weight="bold" fill="#111">Order of operations:</text>
    <text x="40" y="656">1. Photograph the WF26 terminals; confirm the colour table, settle the white/gray order, resolve the brown wire. 2. Verify line 2 (+12 V</text>
    <text x="40" y="674">standing) and line 4/5 (button tests) with the DMM against line 1 — trust measurements, not colours. 3. Disconnect the WF26 (your flat's</text>
    <text x="40" y="692">bell is dead until step 5; the rest of the building is unaffected). 4. Land wires on J2 one-for-one (1→P1 … 5→P5), tug-test. 5. Run the §6</text>
    <text x="40" y="710">bench checks (VERIFICATION.md) before closing the wall: ring detect both channels, gong + mute, session sense, PTT handshake —</text>
    <text x="40" y="728">door-open only after the 2c scope check.</text>
    <text x="40" y="750" fill="#c62828">Bus is ~12 V SELV and shared with the whole building: never short bare wires together while working — tape stripped ends.</text>
  </g>
</svg>
