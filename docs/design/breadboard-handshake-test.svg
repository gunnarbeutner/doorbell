<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 740" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="1000" height="740" fill="#f6f6f4"/>
  <style>
    .wire{stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .v12{stroke:#c0392b}
    .ped{stroke:#1f4e79}
    .aud{stroke:#2e7d32}
    .gnd{stroke:#444}
    .comp{fill:#fff;stroke:#333;stroke-width:2}
    .lbl{fill:#222;font-size:14px}
    .sm{fill:#555;font-size:11.5px}
    .nd{fill:#1f4e79}
    .h{font-size:12.5px;font-weight:bold;fill:#333}
  </style>

  <text x="500" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Breadboard rig — gong‑free TX handshake test (passive split; non‑invasive; board stays in the wall)</text>

  <!-- ============ board tap terminals ============ -->
  <circle cx="86" cy="110" r="7" fill="#fff" stroke="#c0392b" stroke-width="3"/>
  <text x="74" y="106" text-anchor="end" class="lbl" font-weight="bold">P2</text>
  <text x="74" y="121" text-anchor="end" class="sm">line 2 · ~12 V</text>

  <circle cx="86" cy="400" r="7" fill="#fff" stroke="#444" stroke-width="3"/>
  <text x="74" y="396" text-anchor="end" class="lbl" font-weight="bold">P1 / GND</text>
  <text x="74" y="411" text-anchor="end" class="sm">line 1</text>

  <circle cx="908" cy="300" r="7" fill="#fff" stroke="#1f4e79" stroke-width="3"/>
  <text x="922" y="296" class="lbl" font-weight="bold">P3</text>
  <text x="922" y="311" class="sm">line 3</text>

  <circle cx="908" cy="372" r="7" fill="#fff" stroke="#2e7d32" stroke-width="3"/>
  <text x="922" y="368" class="lbl" font-weight="bold">TX_OUT</text>
  <text x="922" y="383" class="sm">codec pad</text>

  <!-- ============ rails ============ -->
  <path class="wire v12" d="M86 110 H260"/>
  <text x="256" y="103" class="sm" fill="#c0392b" text-anchor="end">+12 V (P2)</text>
  <path class="wire gnd" d="M86 400 H300"/>
  <text x="298" y="416" class="sm" fill="#444" text-anchor="end">GND rail (P1)</text>

  <!-- ============ Ra : P2 -> HS_FILT ============ -->
  <path class="wire v12" d="M200 110 V140"/>
  <rect class="comp" x="189" y="140" width="22" height="56" rx="2"/>
  <path class="wire ped" d="M200 196 V240"/>
  <text x="220" y="172" class="lbl">Ra 1.2k</text>

  <circle cx="200" cy="240" r="4" class="nd"/>
  <text x="146" y="234" class="sm">HS_FILT</text>

  <!-- Cf : HS_FILT -> GND (electrolytic, + toward HS_FILT) -->
  <path class="wire ped" d="M200 240 V300"/>
  <path class="wire gnd" d="M182 300 H218 M182 312 H218 M200 312 V400"/>
  <text x="166" y="306" class="lbl" font-weight="bold">+</text>
  <text x="224" y="296" class="lbl">Cf 47µ / 25 V</text>
  <text x="224" y="313" class="sm">electrolytic — + toward HS_FILT</text>
  <text x="224" y="333" class="sm" fill="#777">gong ÷240–360 (673–1009 Hz Klänge, Ra vs Cf)</text>
  <text x="224" y="350" class="sm" fill="#777">τ ≈ 25 ms → talk asserts &lt; 100 ms</text>

  <!-- ============ Rb : HS_FILT -> P3 node ============ -->
  <path class="wire ped" d="M200 240 H300"/>
  <rect class="comp" x="300" y="229" width="80" height="22" rx="2"/>
  <path class="wire ped" d="M380 240 H700"/>
  <text x="306" y="223" class="lbl">Rb 1k</text>
  <text x="398" y="262" class="sm">Ra + Rb = 2.2 kΩ exactly</text>
  <text x="398" y="278" class="sm">— DC‑identical to the WF26's S2/R1 talk bridge</text>

  <path class="wire ped" d="M700 240 V300"/>
  <circle cx="700" cy="300" r="4" class="nd"/>
  <text x="662" y="292" class="sm">P3 node</text>
  <path class="wire ped" d="M700 300 H908"/>

  <!-- TX_OUT audio jumper -->
  <path class="wire aud" d="M908 372 H700 V300"/>
  <text x="716" y="392" class="aud" font-size="11.5px">codec audio jumper</text>

  <!-- ============ net legend ============ -->
  <rect x="600" y="110" width="348" height="116" rx="8" fill="#fff" stroke="#ddd"/>
  <text x="616" y="131" class="h">Nets</text>
  <line x1="616" y1="148" x2="648" y2="148" class="wire v12"/><text x="656" y="152" class="sm">P2 / +12 V  (Ra top)</text>
  <line x1="616" y1="168" x2="648" y2="168" class="wire ped"/><text x="656" y="172" class="sm">handshake pedestal (DC)</text>
  <line x1="616" y1="188" x2="648" y2="188" class="wire aud"/><text x="656" y="192" class="sm">codec audio (AC)</text>
  <line x1="616" y1="208" x2="648" y2="208" class="wire gnd"/><text x="656" y="212" class="sm">GND (P1)</text>

  <line x1="40" y1="452" x2="960" y2="452" stroke="#ddd" stroke-width="1.5"/>

  <!-- ============ op-amp escalation inset ============ -->
  <rect x="40" y="470" width="440" height="248" rx="10" fill="#fff" stroke="#bbb" stroke-dasharray="6 4"/>
  <text x="60" y="494" class="h">Escalation only — OPA991 buffered high‑Z filter</text>
  <text x="60" y="511" class="sm">build only if gate check (c) fails: the talk‑detect wants a switch‑speed assert</text>
  <text x="60" y="527" class="sm">(exact pedestal from a stiff source; ramp decoupled from gong rejection)</text>

  <text x="60" y="604" class="sm" fill="#c0392b" font-weight="bold">P2</text>
  <path class="wire v12" d="M78 600 H92"/>
  <rect class="comp" x="92" y="589" width="54" height="22" rx="2"/>
  <text x="92" y="583" class="sm">Rf 100k</text>
  <path class="wire ped" d="M146 600 H200"/>
  <circle cx="170" cy="600" r="4" class="nd"/>
  <path class="wire ped" d="M170 600 V640"/>
  <path class="wire gnd" d="M152 640 H188 M152 652 H188 M170 652 V678"/>
  <text x="136" y="650" text-anchor="end" class="sm">Cf 100n</text>
  <path class="comp" d="M200 564 L200 636 L280 600 Z"/>
  <text x="208" y="592" class="sm">+</text>
  <text x="208" y="618" class="sm">–</text>
  <path class="wire v12" d="M232 578 V552"/>
  <text x="240" y="549" class="sm" fill="#c0392b">V+ = P2 (+100n decap)</text>
  <path class="wire gnd" d="M232 622 V648"/>
  <text x="240" y="645" class="sm" fill="#444">V– = GND</text>
  <path class="wire ped" d="M280 600 H310"/>
  <circle cx="310" cy="600" r="4" class="nd"/>
  <path class="wire ped" d="M310 600 V668 H140 V612 H200"/>
  <text x="170" y="684" class="sm">unity feedback</text>
  <path class="wire ped" d="M310 600 H322"/>
  <rect class="comp" x="322" y="589" width="58" height="22" rx="2"/>
  <text x="322" y="583" class="sm">R_hs 2.2k</text>
  <path class="wire ped" d="M380 600 H408"/>
  <text x="412" y="604" class="sm" font-weight="bold">→ P3</text>
  <text x="60" y="708" class="sm">same taps &amp; procedure — swap the passive leg for this block</text>

  <!-- ============ setup + procedure notes ============ -->
  <rect x="500" y="470" width="460" height="248" rx="10" fill="#fff" stroke="#bbb"/>
  <text x="518" y="494" class="h">Setup &amp; procedure</text>
  <text x="518" y="516" class="sm">Taps: P2, P3, P1/GND = bus screw terminals · TX_OUT = codec pad.</text>
  <text x="518" y="537" class="sm"><tspan font-weight="bold">Firmware (bench config):</tspan> debug_test_tone <tspan font-weight="bold">ON</tspan>, intercom_ptt <tspan font-weight="bold">OFF</tspan> → K1 open</text>
  <text x="532" y="553" class="sm">(ch1 raw‑P2 gong path never engages); the DAC reaches TX_OUT through</text>
  <text x="532" y="569" class="sm">the always‑wired R26 → C14 → R28 chain. Board otherwise idle.</text>
  <text x="518" y="591" class="sm"><tspan font-weight="bold">Live‑bus:</tspan> ring the station → listen at the door:</text>
  <text x="532" y="607" class="sm">(a) forwarded?   (b) gong‑free?   (c) talk asserts despite the ~25 ms ramp?</text>
  <text x="518" y="629" class="sm"><tspan font-weight="bold">Bench (off‑bus):</tspan> inject 12 V + 1 kHz → Cf strips the 1 kHz; the DC bridge</text>
  <text x="532" y="645" class="sm">reads exactly like a handset talk press (Ra+Rb ≈ 2.2 kΩ, no pedestal drop).</text>
  <text x="518" y="667" class="sm" fill="#b8500a"><tspan font-weight="bold">Unclip after</tspan> — the standing 2.2 kΩ P2↔P3 strap holds "talk" asserted.</text>
  <text x="518" y="689" class="sm">(c) fails → OPA991 inset (left) · (a) fails → the TX plan itself needs rethinking.</text>
  <text x="518" y="709" class="sm">BOM: Ra 1.2 k · Rb 1 k · Cf 47 µF/25 V electro — bench stock; values bench‑gated.</text>
</svg>
