# Klingel V4.0 — BENCH TEST firmware (proto1 boards, tag `v4-proto1-ordered`, 2026-06-12)
# =============================================================================================
# This is NOT the deployment config. It targets the *physical proto1 board that arrived*, which
# predates ~95 commits of design change and the current HEAD design in several fundamental ways:
#
#   proto1 board (this file)            HEAD design (firmware/doorbell-v4.yaml)
#   ----------------------------------  --------------------------------------------
#   MCU   ESP32-C6-WROOM-1 (PCB ant.)   ESP32-C6-MINI-1U-H4 (u.FL)   -> same chip, diff pads
#   sw    G6K-2F relays + 2N7002 drive  PhotoMOS SSRs (GAQ*) 300R     -> diff part, same polarity
#   audio ES8311 + SM-LP-5001 xfmr      ES8311 transformer-LESS       -> same codec, diff analog
#   bus   6-pin, line-4 break (IN_P4)   5-pin, chime-mute via C1      -> diff bus topology
#   man.  CAS-220 slide switches        SPPJ322300                    -> diff part
#
# So the bus-side behaviour (door bridge, chime suppress via line-4 break, session seal-in,
# break-before-make door, the transformer audio tap, TX-out reach) does NOT represent the latest
# design and is not worth chasing on this board. The pin numbers below are the *proto1* board's
# wiring (from the as-ordered firmware), NOT HEAD's — flashing HEAD's doorbell-v4.yaml onto this
# board would drive the wrong pads.
#
# WHAT THIS CONFIG TESTS — the device-level subsystems that DO carry forward to the latest design:
#   1. MCU bring-up: native USB-Serial-JTAG flashing + logs, boot, strapping, WiFi/API.
#      (Same ESP32-C6 chip + native-USB approach as the MINI-1U next spin — de-risks it directly.)
#   2. Power tree: USB-C 5V -> SS14 -> 3.3V LDO. If WiFi-TX runs without brown-out, the rail holds.
#   3. ES8311 codec: I2C enumeration @0x18 + codec register init. The codec, its power/decoupling,
#      MCLK and I2C/I2S are identical subsystems in the latest design (only the analog tap changed).
#   4. Output drive K1/K2/K3: GPIO -> driver -> relay. Confirms the MCU output path + active-high
#      driver concept (latest design keeps active-high; only relay->SSR changed). Listen for clicks
#      / meter the contacts. Bus-SIDE wiring of those contacts is among the known-bad nets — ignore.
#   5. Sense inputs OC1/OC2/OC3: opto -> phototransistor -> GPIO (internal/external pull). Confirms
#      the input GPIOs + opto liveness. Front-end topology changed (per-opto limiters etc.) so judge
#      the digital edge, not the analog network.
#
# All production automation (auto-open, HA events, cross-talk masking, K1/K3 release-race guard) is
# intentionally stripped: this is raw manual control + raw sense readout for the bench.
#
# Bench safety: power from USB on the bench. Drive K2 (P2<->P3 door bridge) onto the real TV20/S
# only deliberately. Note the proto1 HARDWARE INTERLOCK: K3 pole-B is in series with K1's gate
# drive, so K1 may not actuate unless K3 is energised first (see the K1 switch below).
#
# Flash + logs over USB-C:  esphome run firmware/doorbell-v40-test.yaml
# Needs firmware/secrets.yaml with wifi_ssid / wifi_password (same as the other configs); if WiFi
# is unavailable it falls back to its own AP + captive portal so it stays reachable for re-provisioning.

esphome:
  name: doorbell-v40-test
  friendly_name: Doorbell V4.0 bench test

esp32:
  board: esp32-c6-devkitc-1     # generic ESP32-C6 board def — matches U1 (ESP32-C6-WROOM-1)
  framework:
    type: esp-idf

# Logs over the native USB-Serial-JTAG (no UART pins broken out on this board).
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG

# Plain API (no encryption needed on the bench) so the ESPHome dashboard / HA can see it if wanted.
api:

ota:
  - platform: esphome

# STA from secrets, with an AP + captive-portal fallback so the device stays reachable for config on the
# bench even without the home WiFi. Joining WiFi here is also the power-tree stress test (WiFi-TX is
# the brown-out risk on the USB 5V -> LDO rail).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "doorbell-v40-test"
    password: "REDACTED_AP_PASSWORD"

captive_portal:

# Controls appear in Home Assistant / the ESPHome dashboard via the API. No web_server: on the
# PSRAM-less C6 it competes for heap with the media_player speaker buffer (a source of the TX
# allocation failures) and is not needed for OTA/API/logs.

# Heap watch — surfaces free heap + largest free block so you can see fragmentation across plays.
debug:

# -----------------------------------------------------------------------------------------------
# (3) ES8311 CODEC — I2C liveness + register init.  scan:true logs every device that ACKs; the
# ES8311 must appear at 0x18 (CE -> 10k -> GND). That single line confirms codec power + I2C wiring.
# Instantiating the audio_dac then runs ESPHome's full codec init over I2C (errors show in the log).
# NOTE: the analog audio path on this board is the SM-LP-5001 *transformer* tap, which the latest
# design deleted (it is transformer-LESS now), so the analog audio QUALITY here is not relevant —
# only "does the codec come up and clock I2S" carries forward. To exercise I2S, scope MCLK at U3.
# -----------------------------------------------------------------------------------------------
i2c:
  sda: GPIO18                # I2C_SDA — ES8311 (U3) control bus
  scl: GPIO19               # I2C_SCL — ES8311 (U3) control bus
  scan: true                # <-- expect "Found i2c device at address 0x18" in the boot log

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO0    # I2S_WS / LRCK
    i2s_bclk_pin: GPIO11    # I2S_BCLK / SCLK
    i2s_mclk_pin: GPIO6     # I2S_MCLK

audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18
    sample_rate: 16000     # 48k (was 16k): better sigma-delta noise-shaping pushes more
                           # quantization noise out of band — tests how much of the white-noise
                           # floor is quantization vs AVDD-supply coupling
    use_microphone: false  # RX/mic capture removed (DAC/TX-only here); frees the I2S RX path + heap

# I2S audio.  TX: a media_player streams audio from Home Assistant -> es8311 DAC over I2S
# (DSDIN / GPIO7) — play TTS or a clip from HA.  ESPHome 2026.5.x only ships the `speaker` media
# player (the old i2s_audio one was removed), so it feeds an i2s_audio `speaker`; buffer_size is cut
# far below the 1 MB default because the C6 has no PSRAM (decoding is RAM-tight — keep clips short).
# NOTE: this proto's ES8311 *analog* output is the dead path (the AVDD/bias-network gap), so audio
# clocks out over I2S but produces no analog until that's reworked — the media_player still validates
# the HA -> board -> codec digital path and is the right setup for the next (fixed) spin.
speaker:
  - platform: i2s_audio
    id: intercom_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_codec
    sample_rate: 48000      # match the codec (48k); the speaker re-rates per stream (16 kHz WAV here)
    i2s_dout_pin: GPIO7     # I2S_DOUT / DSDIN (ESP->codec, playback)

media_player:
  - platform: speaker
    id: intercom_media
    name: "Intercom DAC (media player)"
    buffer_size: 32768      # 32 KB read buffer for the WAV/PCM stream from HA (no on-device decode).
    # Single pipeline (no `mixer`, to save RAM): HA TTS/announcements and play-media both use it.
    # format: WAV makes HA transcode to PCM (ffmpeg) so the device NEVER decodes FLAC — that decoder
    # was the heap hog that collapsed the heap to ~3 KB and crashed playback. 16 kHz mono is plenty for
    # voice/chimes, keeps buffers small, and is trivial WiFi bandwidth. Raise sample_rate / num_channels
    # if you ever need fuller-range audio (still no on-device decode).
    announcement_pipeline:
      speaker: intercom_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1

# -----------------------------------------------------------------------------------------------
# (5) SENSE INPUTS — raw opto readout (no production masking).  Each opto pulls its pin LOW when
# active; external 10k to +3V3 (R21/R22/R23) holds it HIGH at idle, so inverted:true => "on" when
# the LED conducts.  Test by ringing the bell / injecting current on the bus line and watching the
# state flip in HA / the ESPHome dashboard or the log.  Front-end topology changed since this board — judge the digital
# edge, not the analog network.
# -----------------------------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    name: "OC1 sense (session — line-4 coil)"
    id: oc1_sense
    pin:
      number: GPIO23
      inverted: true
      mode:
        input: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

  - platform: gpio
    name: "OC2 sense (House Turruf, P4)"
    id: oc2_sense
    pin:
      number: GPIO3
      inverted: true
      mode:
        input: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

  - platform: gpio
    name: "OC3 sense (Apartment Etagenruf, P5)"
    id: oc3_sense
    pin:
      number: GPIO2
      inverted: true
      mode:
        input: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

# -----------------------------------------------------------------------------------------------
# (4) OUTPUT DRIVE — manual relay control.  Active-HIGH: GPIO high -> 2N7002 on -> G6K-2F relay
# energised (you should hear a click; meter the contacts).  restore_mode ALWAYS_OFF so nothing
# energises at boot.  The contact-side BUS wiring is among the known-bad nets — confirm the relay
# actuates (click / continuity), not what it does to the intercom.
#   K1 = PTT relay   (GPIO21)   -- HW interlock: K3 must be energised for K1's gate drive to pass,
#                                  so energise "K3 chime-suppress" first when testing K1.
#   K2 = door / OT   (GPIO20)   -- P2<->P3 bridge. Use the momentary button for a 1.75 s pulse.
#   K3 = chime mute  (GPIO22)
# -----------------------------------------------------------------------------------------------
output:
  - platform: gpio
    pin: GPIO21
    id: k1_ptt_out
  - platform: gpio
    pin: GPIO20
    id: k2_door_out
  - platform: gpio
    pin: GPIO22
    id: k3_mute_out

switch:
  - platform: output
    name: "K1 PTT relay (needs K3 on — interlock)"
    id: k1_ptt
    output: k1_ptt_out
    restore_mode: ALWAYS_OFF
  - platform: output
    name: "K2 door OT bridge (hold)"
    id: k2_door
    output: k2_door_out
    restore_mode: ALWAYS_OFF
  - platform: output
    name: "K3 chime suppress"
    id: k3_mute
    output: k3_mute_out
    restore_mode: ALWAYS_OFF

button:
  - platform: output
    name: "K2 door pulse (1.75 s)"
    output: k2_door_out
    duration: 1750ms

# -----------------------------------------------------------------------------------------------
# (1)(2) HEALTH / DIAGNOSTICS — confirms the board is alive and the power + WiFi are stable.
# A clean uptime climb under WiFi load is the practical power-tree pass.
# -----------------------------------------------------------------------------------------------
sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi signal"
    update_interval: 10s
  - platform: internal_temperature
    name: "ESP internal temperature"
  # Fragmentation watch: "Heap largest free block" dropping toward the buffer size = the fault.
  - platform: debug
    free:
      name: "Heap free"
    block:
      name: "Heap largest free block"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP address"
    ssid:
      name: "Connected SSID"
  - platform: version
    name: "ESPHome version"
