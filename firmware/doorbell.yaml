# ESPHome config for the ESP32-S3 doorbell controller (U1 = ESP32-S3-WROOM-1U-N16R8, U3 = ES8311 codec).
#
# GPIO map (S3-WROOM-1U; USB on the north edge, the ES8311 I2C/I2S bus ascending down the codec edge):
#   House Doorbell     (OC1 / Türruf sense)        : GPIO12
#   Apartment Doorbell (OC2 / Etagenruf sense)     : GPIO13
#   front_door_buzzer  (DOOR_DRV → K2+K4 door pair) : GPIO10
#   suppress_chime_bin (K3 / chime suppress)       : GPIO11
#   K1                 (PTT SSR, talk=energised)   : GPIO9
#   post-fuse +5 V monitor (VBUS_F_ADC / ADC1_CH4) : GPIO5
#   status LED          (active-low D6)             : GPIO7
#   I2C_SDA  (ES8311 control)                      : GPIO38
#   I2C_SCL  (ES8311 control)                      : GPIO39
#   I2S_MCLK (master clock)                        : GPIO40
#   I2S_BCLK (bit clock, SCLK)                     : GPIO41
#   I2S_DIN  (capture, ASDOUT)                     : GPIO42
#   I2S_WS   (LRCK)                                : GPIO2
#   I2S_DOUT (DAC / playback, DSDIN)               : GPIO1
#   logger                                         : native USB-Serial-JTAG (GPIO19/GPIO20 = USB D-/D+)
# The ES8311 bus is ordered ascending by module pad — SDA,SCL,MCLK,BCLK,DIN on GPIO38-42, then WS,DOUT
# on GPIO2/GPIO1 — so it fans out down U1's codec edge with no crossings, matching U3's pin sequence.
# The three SSR gates (GPIO9/10/11) and two sense optos (GPIO12/13) run ascending along the bus-side
# edge. BOOT is GPIO0 (boot strap + SW1); EN is the module's dedicated EN pin (SW2). The S3 is dual-core
# with 16 MB flash + 8 MB PSRAM (audio buffers live in PSRAM). Native USB-Serial-JTAG = flashing + logs.
#
# SSR gate outputs are ACTIVE-HIGH (see the output section): GPIO HIGH -> SSR LED on -> contact made.
#
# Deployed identity: the V4 assumes the retired V3's name (doorbell), IP (192.168.3.18), api
# encryption key and OTA password, so the Home Assistant side carries over without changes.
# Bench bring-up flashes doorbell-bench.yaml instead (bench identity doorbell2 @ .78, HA
# events stripped, debug SSR switches added). The configs use separate build dirs (different
# device names), but after any device-name change run `esphome clean` — a stale dependency graph
# fails the build, and a piped `compile && upload` can then silently re-flash the previous binary.

# Local ESPHome 2026.7.0 component copies: `speaker` carries the announcement-pipeline state reset
# described in https://github.com/esphome/esphome/issues/15692; `i2s_audio` carries the keep-alive
# change from https://github.com/esphome/esphome/pull/15565. See each component's README.md.
external_components:
  - source:
      type: local
      path: components
    components:
      - speaker
      - i2s_audio

esphome:
  name: doorbell
  min_version: 2026.7.0
  on_boot:
    # Greeting registry — index-aligned with the `next_greeting` select options. The greet /
    # greet_and_open api actions resolve a greeting NAME to an index via the select (index_of), so the
    # select's option order is authoritative. Index 0 = None (nullptr = "just open, no door audio"); add
    # greetings after it in the SAME order as the select options. Keeps file choice branch-free
    # (index -> AudioFile*); adding a greeting = one files: entry + one push_back + one select option.
    priority: -100
    then:
      - lambda: |-
          id(greetings).push_back(nullptr);            // 0 = None
          id(greetings).push_back(id(welcome_chime));  // 1 = Chime
          id(greetings).push_back(id(welcome_silent)); // 2 = Silent (10 s inaudible timing test)
          id(greetings).push_back(id(welcome_hello));  // 3 = Hello
          id(greetings).push_back(id(welcome_secret)); // 4 = Secret
          id(greetings).push_back(id(welcome_windows));// 5 = Windows
          // Registry integrity: the vector and the next_greeting select options are index-aligned by
          // hand — flag a forgotten push_back / option at boot instead of silently playing the wrong
          // (or no) greeting later.
          if (id(greetings).size() != id(next_greeting).traits.get_options().size())
            ESP_LOGE("greetings", "registry/select length mismatch: %u vs %u",
                     (unsigned) id(greetings).size(),
                     (unsigned) id(next_greeting).traits.get_options().size());
      # Enable the ES8311 DAC soft-ramp (REG0x37) to fade the DAC in/out and soften the enable/mute
      # transient. ESPHome's codec init leaves REG37 at 0x08 (softramp disabled); 0x48 keeps the low
      # nibble and sets DAC_RAMPRATE = 4. REG37 is written only at codec setup(), so this sticks; the
      # delay lets setup() finish. Only partly tames the analog VMID pop — see TODO.md (V4.2 mute).
      - delay: 1s
      - lambda: |-
          uint8_t reg37[2] = {0x37, 0x48};
          id(codec_i2c)->write(0x18, reg37, 2);
          ESP_LOGI("es8311", "DAC soft-ramp enabled (REG0x37 = 0x48)");
      # Prime the retained I2S channel once with K1 open. Stopping the speaker leaves the allocated,
      # configured channel ready for same-format welcome playback without a cold rebuild.
      - lambda: |-
          id(intercom_speaker).set_audio_stream_info(audio::AudioStreamInfo(16, 1, 32000));
          id(i2s_prime_active) = true;
      - wait_until:
          condition:
            speaker.is_playing: intercom_speaker
          timeout: 2s
      - lambda: |-
          if (!id(intercom_speaker).is_running())
            ESP_LOGE("audio", "I2S keep-alive prime never reached RUNNING");
      - delay: 100ms
      - lambda: 'id(i2s_prime_active) = false;'
      - speaker.stop: intercom_speaker
      - wait_until:
          condition:
            speaker.is_stopped: intercom_speaker
          timeout: 2s
      - lambda: |-
          if (id(intercom_speaker).is_stopped())
            ESP_LOGI("audio", "I2S keep-alive channel primed");
          else
            ESP_LOGE("audio", "I2S keep-alive prime did not stop cleanly");

esp32:
  board: esp32-s3-devkitc-1     # generic ESP32-S3 board def; U1 = ESP32-S3-WROOM-1U-N16R8
  variant: esp32s3
  flash_size: 16MB              # N16R8 module = 16 MB flash
  framework:
    type: esp-idf

psram:
  mode: octal                   # N16R8 = 8 MB octal PSRAM — audio buffers live here, off the 512 KB SRAM
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG   # logs over the native USB service connection (no UART pins are broken out)

status_led:
  pin:
    number: GPIO7
    inverted: true              # D6 anode is fed from +3V3; sinking IO7 lights it

api:
  encryption:
    key: !secret api_encryption_key
  # Immediate, HA-driven greeting/open. `greeting` is a greeting NAME matching a next_greeting select
  # option ("None"/"Chime"/"Silent"/"Hello"/"Secret"/"Windows", case-sensitive) — the select's
  # option list IS the name
  # registry, so index_of resolves name -> greetings[]. Unknown/empty name -> None (no door audio; the
  # door still opens for greet_and_open). HA maps a trigger type (parcel/food/guest/arrival) -> a name.
  actions:
    - action: greet
      variables:
        greeting: string
      then:
        - lambda: |-
            auto idx = id(next_greeting)->index_of(greeting);
            id(welcome_file) = (idx.has_value() && idx.value() < id(greetings).size())
                                 ? id(greetings)[idx.value()] : nullptr;
            if (!idx.has_value())
              ESP_LOGW("greet", "unknown greeting '%s' — no audio", greeting.c_str());
        - script.execute: play_welcome
    - action: greet_and_open
      variables:
        greeting: string
      then:
        - lambda: |-
            auto idx = id(next_greeting)->index_of(greeting);
            id(welcome_file) = (idx.has_value() && idx.value() < id(greetings).size())
                                 ? id(greetings)[idx.value()] : nullptr;
            if (!idx.has_value())
              ESP_LOGW("greet", "unknown greeting '%s' — opening with no audio", greeting.c_str());
        - script.execute: welcome_and_open

web_server:
  port: 80
  ota: false
  local: true

ota:
  platform: esphome
  password: !secret ota_password

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: "none"

  manual_ip:
    static_ip: 192.168.3.18
    gateway: 192.168.3.1
    subnet: 255.255.255.0
    dns1: 192.168.3.53

i2c:
  id: codec_i2c            # referenced by the on_boot DAC soft-ramp override (REG0x37)
  sda: GPIO38
  scl: GPIO39
  scan: false

i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO2
  i2s_bclk_pin: GPIO41
  i2s_mclk_pin: GPIO40

audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18          # CE → R20 (10k) → GND on U3 → I2C addr 0x18
    sample_rate: 32000     # Match the embedded assets and I2S speaker; 16 kHz would discard their upper band.
    use_microphone: false  # false = the analog MIC1P/MIC1N path (true would select a PDM digital mic —
                           # misleading name). Moot now that no microphone: is declared, but keep it false.
    mic_gain: 0DB          # the input divider (R30/R31 22k + R32/R33 3.3k→VMID, ~-18dB) already drops the
                           # bus; the PGA can't attenuate, and gong peaks (>2Vrms) need the headroom.

speaker:
  - platform: i2s_audio
    id: intercom_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_codec
    i2s_dout_pin: GPIO1
    sample_rate: 32000
    keep_alive: true       # local port of esphome/esphome#15565, pinned to ESPHome 2026.7.0

# NO `microphone:` here. The mic (I2S RX) and the speaker (I2S TX) share one half-duplex I2S bus; a
# declared mic holds the bus and makes the speaker fail to start ("Parent bus is busy"), silently
# breaking welcome-audio playback (the door still opens, but the chime never plays). The mic was
# unused here anyway once voice_assistant was removed. Re-add it ONLY together with a coordinator
# (voice_assistant) that manages bus hand-off — never a bare mic alongside the media_player speaker.

# Media player over the codec speaker. With PTT (K1) engaged the audio rides the TX path to the bus.
media_player:
  - platform: speaker
    id: intercom_media
    name: "Intercom"
    announcement_pipeline:
      speaker: intercom_speaker
      format: WAV
      sample_rate: 32000
      num_channels: 1
    # Greeting files — the single spot for embedding audio into the image. Keep each SHORT (a few
    # seconds): the buzzer is sequenced AFTER the welcome, so a file's length adds to door-open
    # latency and must finish within play_welcome's 30 s wait_until ceiling. Add one: new id here,
    # then have a caller stage it (`id(welcome_file) = id(<new_id>)`) — no branching; play_welcome
    # plays whatever pointer is staged, via C++ play_file().
    files:
      - id: welcome_chime
        file: "sounds/chime.wav"           # 32 kHz mono, peak -0.5 dBTP
      - id: welcome_silent
        file: "sounds/silent.wav"          # 32 kHz mono, 10 s digital silence — exercises timing inaudibly
      - id: welcome_hello
        file: "sounds/weird_hello.wav"      # 32 kHz mono, peak -0.5 dBTP
      - id: welcome_secret
        file: "sounds/secret.wav"          # 32 kHz mono; 1.36 s Zelda chime; peak -0.5 dBTP
      - id: welcome_windows
        file: "sounds/windows.wav"         # 32 kHz mono; 6.12 s Windows 95 startup; peak -0.5 dBTP
    # K1 (off-hook handshake + TX route) and the welcome_playing gong-mute normally FOLLOW player
    # state. The sequenced welcome path below is the exception: it owns K1 across the real file and
    # cleanup. Boot priming uses raw speaker writes, which can make this media player temporarily
    # report ANNOUNCING/IDLE even though no media pipeline is active, so those state changes must not
    # operate K1.
    on_announcement:
      - if:
          condition:
            lambda: 'return !id(welcome_sequence_active) && !id(i2s_prime_active);'
          then:
            - switch.turn_on: intercom_ptt
            - globals.set: { id: welcome_playing, value: "true" }
    on_play:
      - if:
          condition:
            lambda: 'return !id(welcome_sequence_active) && !id(i2s_prime_active);'
          then:
            - switch.turn_on: intercom_ptt
            - globals.set: { id: welcome_playing, value: "true" }
    on_idle:
      - if:
          condition:
            lambda: 'return !id(welcome_sequence_active) && !id(i2s_prime_active);'
          then:
            - switch.turn_off: intercom_ptt
            - globals.set: { id: welcome_playing, value: "false" }
    on_pause:
      - if:
          condition:
            lambda: 'return !id(welcome_sequence_active) && !id(i2s_prime_active);'
          then:
            - switch.turn_off: intercom_ptt
            - globals.set: { id: welcome_playing, value: "false" }

globals:
  # The boot-prime zero-fill source and callback guard. Raw speaker writes can make the media player
  # report synthetic ANNOUNCING/IDLE transitions; those must not operate K1 while the prime is active.
  - id: i2s_prime_active
    type: bool
    restore_value: no
    initial_value: "false"
  # While true, play_welcome owns K1 and welcome_playing; media-player state callbacks cannot race
  # the scripted route timing or tear K1 down during the file handoff.
  - id: welcome_sequence_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: welcome_playing
    type: bool
    restore_value: no
    initial_value: "false"
  # The greeting to play — a pointer into the media_player's files:. A caller stages it
  # (`id(welcome_file) = id(<file>)`) before running play_welcome; nullptr = play nothing (the default).
  - id: welcome_file
    type: audio::AudioFile*
    restore_value: no
    initial_value: "nullptr"
  # Greeting registry — populated + explained in esphome: on_boot. greetings[0] = nullptr (None).
  - id: greetings
    type: std::vector<audio::AudioFile*>
    restore_value: no
  # Earliest time a ring-triggered welcome may start. V4.1 measurements found that the door station
  # suppresses the start of TX until ~1.45 s after a Türruf; the same guard also avoids presenting the
  # initial gong to V4.1's unisolated P2-sourced talk handshake. Manual/API greetings with no recent
  # ring see an expired deadline and start immediately.
  - id: welcome_not_before_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  # A ring-triggered open must never happen before this time. welcome_and_open treats it as a MINIMUM:
  # a selected greeting always finishes and K1 settles first, so a long greeting extends ring→open.
  - id: ring_open_not_before_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

# Door-station playback: mute the own speaker (K3, via the chime_enabled guard), present the off-hook
# handshake (K1), play the embedded file, then restore everything. The I2S channel was primed at boot
# and is retained between plays by the local keep-alive component. Also the instrument for the
# AUDIO-2/AUDIO-6 TX-reach test — trigger from the HA app while standing at the door station.
script:
  - id: play_welcome
    mode: single
    then:
      # Resolve and log the actual staged pointer here, at the common playback entry point, so the
      # trace covers select-driven buttons and both API actions. Include the embedded byte length to
      # distinguish a correct selection from a stale/wrong AudioFile even when no sound is heard.
      - lambda: |-
          auto *file = id(welcome_file);
          if (file == nullptr) {
            ESP_LOGI("greet", "welcome selected: None (no audio)");
          } else {
            const auto &options = id(next_greeting).traits.get_options();
            const char *name = "unregistered";
            for (size_t i = 0; i < id(greetings).size(); ++i) {
              if (id(greetings)[i] == file) {
                if (i < options.size()) name = options[i];
                break;
              }
            }
            ESP_LOGI("greet", "welcome selected: %s (%u bytes)", name, (unsigned) file->length);
          }
      # No file staged (welcome_file == nullptr, e.g. next_greeting = None) -> do nothing at all: no K1
      # handshake, no wait. That lets welcome_and_open open promptly when there is no greeting.
      - if:
          condition:
            lambda: 'return id(welcome_file) != nullptr;'
          then:
            - media_player.volume_set:
                id: intercom_media
                volume: 75%                 # = 0 dB, the clean ceiling — above this is digital gain (clips)
            # The ownership guard is set before the ring guard, K1 and playback so media-player state
            # callbacks cannot race the scripted route timing. I2S/ES8311 were primed at boot with K1 open.
            - globals.set: { id: welcome_sequence_active, value: "true" }
            # Defer ring-triggered TX until the measured V4.1 door-station suppression has ended.
            - delay: !lambda |-
                uint32_t remaining = id(welcome_not_before_ms) - millis();
                return remaining <= 5000 ? remaining : 0;
            # Connect the settled codec output, then give the AC-coupled output and K1 20 ms before
            # starting the file. Same-format playback reuses the retained channel instead of rebuilding it.
            - switch.turn_on: intercom_ptt
            - globals.set: { id: welcome_playing, value: "true" }
            - delay: 20ms
            # Play the staged file as an announcement. The script owns K1 and gong mute until the real
            # file plus speaker drain have ended, so synthetic media-player state changes cannot race it.
            - lambda: 'id(intercom_media).play_file(id(welcome_file), true, false);'
            # Cross the decoder handoff, then use final IDLE as the file/drain completion marker.
            - delay: 400ms
            - wait_until:
                condition:
                  not:
                    media_player.is_announcing: intercom_media
                timeout: 30s
            - switch.turn_off: intercom_ptt
            - globals.set: { id: welcome_playing, value: "false" }
            - globals.set: { id: welcome_sequence_active, value: "false" }

  # Greet, THEN open the door — strictly sequential, never concurrent: K1 (TX) must be fully
  # released before the buzzer's K2 bridges P2↔P3, or K2 shorts out the audio tail. play_welcome
  # ends with K1 off; script.wait blocks until it finishes, then a short settle before the door
  # bridge makes. (For a short greeting only — see the length cap on files: above.)
  - id: welcome_and_open
    mode: single
    then:
      - script.execute: play_welcome    # plays whatever the caller staged in welcome_file (no-op if nullptr)
      - script.wait: play_welcome
      # K1 must be fully released before K2 makes. Then honour the ring→open MINIMUM deadline; if the
      # greeting ran longer, the expired deadline adds no delay. With no greeting this produces the
      # same 1.75 s ring→open delay; manual/API opens with no recent ring retain only the 100 ms settle.
      - delay: 100ms
      - delay: !lambda |-
          uint32_t remaining = id(ring_open_not_before_ms) - millis();
          return remaining <= 5000 ? remaining : 0;
      - button.press: front_door_buzzer

  # Stage the HA-primed greeting (next_greeting select) into welcome_file — synchronously, so a caller
  # can read welcome_file right after script.execute. Shared by the ring reflex and the "Welcome & Open
  # Door" button. None / out-of-range -> nullptr (no door audio).
  - id: stage_selected_greeting
    then:
      - lambda: |-
          auto idx = id(next_greeting).active_index();
          id(welcome_file) = (idx.has_value() && idx.value() < id(greetings).size())
                               ? id(greetings)[idx.value()] : nullptr;

# Internal boot-prime source: while `i2s_prime_active` is true, keep the 32 kHz speaker ring buffer
# topped up with digital zeros. K1 remains open, so the one cold I2S/codec start cannot reach P3. The
# source is inactive after boot; normal welcome playback reuses the retained, configured channel.
interval:
  - interval: 50ms
    then:
      - lambda: |-
          if (!id(i2s_prime_active)) return;
          static const int16_t zeros[512] = {};
          while (true) {
            size_t wrote = id(intercom_speaker).play((const uint8_t *) zeros, sizeof(zeros));
            if (wrote < sizeof(zeros)) break;
          }

bluetooth_proxy:
  active: false

esp32_ble_tracker:
  scan_parameters:
    active: False

binary_sensor:
  - platform: gpio
    name: "Apartment Doorbell"
    icon: mdi:doorbell
    id: apartment_doorbell
    pin:
      number: GPIO13           # OC2 collector — Etagenruf (P5) sense
      inverted: true           # opto pulls the pin LOW when the bell rings
      mode:
        input: true            # R23 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC2 sits across the speaker pair (P5<->P1), so it pulses on ANY loud speaker
      # audio: the Etagenruf tone, the Türruf 3-Klang gong and PTT speech alike.
      # Only report a floor call when no house ring (gong) and no PTT (speech)
      # explains the audio. All masked sources are AC, so the raw input keeps toggling
      # and this filter re-evaluates continuously while masked.
      - lambda: |-
          if (id(house_doorbell).state || id(intercom_ptt).state) return false;
          return x;
      # The tone reaches the opto only on positive half-cycles above the LED threshold,
      # so the raw input toggles at audio rate (~1ms low / ~1.4ms high) — a plain
      # delayed_on can never latch on it. Stretch the conduction pulses into a
      # continuous level first, then require that to persist. 150ms also outlasts
      # house_doorbell's 50ms latch, so a gong that starts together with a house ring
      # cannot beat the mask above.
      - delayed_off: 50ms      # bridge the gaps between tone half-cycles
      - delayed_on: 150ms      # require a sustained tone, and let house_doorbell latch first
      - delayed_off: 2s
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_apartment
  - platform: gpio
    name: "House Doorbell"
    icon: mdi:doorbell
    id: house_doorbell
    pin:
      number: GPIO12           # OC1 collector — Türruf (line 4 / P4) sense
      inverted: true
      mode:
        input: true            # R22 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC1 senses the Türruf DC on line 4 (P4). The board's PTT bridges P2↔P3 only (K1: P2↔TALK_BRIDGE
      # + TX_OUT↔P3), so energising K1 cannot couple onto line 4 — no PTT mask needed. Debounce only:
      - delayed_on: 50ms
      - delayed_off: 2s
    on_press:
      then:
        # Keep two independent deadlines: TX audio starts no earlier than 1.45 s, when the measured
        # door-station suppression has ended; opening is never earlier than 1.75 s. A greeting may
        # extend the latter because welcome_and_open always finishes TX before it makes the door bridge.
        - lambda: |-
            id(welcome_not_before_ms) = millis() + 1450;
            id(ring_open_not_before_ms) = millis() + 1750;
        # Autonomous open reflex — runs locally so a ring still opens even when HA is slow or down.
        # HA arms it via switch.auto_open_front_door (PERSISTENT; HA owns on/off) and primes which
        # greeting plays via the next_greeting select. welcome_and_open sequences greet-then-open; the
        # greeting observes the V4.1 TX-ready deadline, then K1 releases before K2 bridges the door.
        # Events are generic device outputs HA consumes for notifications; HA re-derives context from state.
        - if:
            condition:
              switch.is_on: auto_open_front_door
            then:
              - script.execute: stage_selected_greeting
              # welcome_and_open owns both invariants: a 1.75 s minimum ring→open delay regardless of
              # selection, and completion of any selected greeting before K2 makes.
              - script.execute: welcome_and_open
              - homeassistant.event:
                  event: esphome.doorbell_opened
            else:
              - homeassistant.event:
                  event: esphome.doorbell_not_opened
  - platform: template
    name: "Chime Enabled"
    id: chime_enabled
    icon: mdi:music-note
    lambda: |-
      // K3 (NC SSR) opens C1 to mute the front-door gong. It sits in the C1 audio path (P4↔C1), NOT
      // in line 4 — so it does NOT break the session, and the board's codec RX/TX (on the speech pair,
      // lines 2/3) is independent of it. (It does mute the handset's own LS1 listen, which rides C1.)
      // Interim V4.1 policy: while suppression is effectively requested, keep K3 open for the whole
      // session. A later neighbour ring can put its gong on shared P2 and, while our K5 is sealed,
      // feed it into LS1 if K3 is reclosed. This deliberately disables passive LS1 listen and the
      // physical SW4 microphone in suppression mode; smart codec RX/TX and the door actuator remain.
      // V4.1's installed SW4 is mechanically obstructed. The V4.2 candidate has a dry GPIO47 PTT
      // input + K1 hardware inhibit, but its firmware policy awaits fabricated-board validation
      // (TODO.md). Smart TX is independent of K3, so it is not a reason to reclose K3.
      if (id(welcome_playing)) return false;  // door-station playback: hold K3 = own speaker muted
      // The gong is suppressed by default (rings are announced via Alexa). Fail SAFE to ring so a
      // doorbell is never silently missed: suppress ONLY while HA is connected AND actively requests
      // it. HA clears suppress_chime when the announcement path is down (internet/Alexa), and a
      // disconnected HA drops ha_connected -> either way the gong rings. force_chime is the manual
      // override that forces the gong on regardless.
      return id(force_chime).state || !(id(suppress_chime).state && id(ha_connected).state);
    on_press:
      then:
        # State went true ("let it ring"): drop K3 so the gong's C1 path is closed (the gong rings).
        # K3 (the C1 mute) and K1 (the talk handshake) are independent — no inter-SSR timing
        # constraint, and K3 never makes a P2↔P3 short.
        - output.turn_off: suppress_chime_bin   # K3 off -> C1 closed -> gong rings
    on_release:
      then:
        - output.turn_on: suppress_chime_bin    # K3 on -> C1 open -> silence the gong
  # API connectivity — the failsafe gate for chime suppression. When the HA API link drops this goes
  # off, so the suppress lambda above can no longer mute the gong (it rings). No specific HA entity.
  - platform: status
    name: "HA Connected"
    id: ha_connected
    entity_category: diagnostic

switch:
  # K1 (talk handshake + TX gate) is owned by play_welcome for scripted greetings; direct media-player
  # use falls back to on_announcement/on_idle. It is read by the OC2 masking policy, not a user control.
  # Kept off HA (id, no name): a stray toggle could assert a pedestal or cut K1 mid-greeting.
  - platform: output
    id: intercom_ptt
    output: ptt_relay_bin
    restore_mode: ALWAYS_OFF   # boot into listen/idle (K1 de-energised = talk strap open)
    on_turn_on:
      - logger.log: { format: "PTT ENGAGED  (K1 on)",  level: INFO, tag: ptt }
    on_turn_off:
      - logger.log: { format: "PTT DISENGAGED (K1 off)", level: INFO, tag: ptt }
  - platform: template
    name: "Auto-open front door"
    icon: mdi:gate
    id: auto_open_front_door
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Force Chime"
    icon: mdi:bell-ring
    id: force_chime
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  # HA-driven chime-suppression REQUEST (the occupancy / quiet-hours policy lives in HA). Only honoured
  # while the API is connected (see the chime_enabled lambda) — a dead HA can't leave the gong
  # muted. Default off = don't suppress.
  - platform: template
    name: "Suppress Chime"
    icon: mdi:bell-off
    id: suppress_chime
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# *** IMPORTANT — the SSR gates are ACTIVE-HIGH, so these outputs are NOT inverted. ***
# Each SSR LED is driven from the GPIO through a 220 Ω series R (with a 10 k pull-down): GPIO HIGH ->
# LED on -> contact made, so `turn_on` drives the pin HIGH => no `inverted:` here. Adding
# `inverted: true` by mistake would energise BOTH at boot (door opener pulsing + chime force-
# suppressed) — exactly what the gate pull-downs are there to prevent.
output:
  - platform: gpio
    pin: GPIO9               # K1 — PTT SSR (energised = talk: P2↔TALK_BRIDGE handshake + TX_OUT↔P3 gate, codec→C14→R26→P3)
    id: ptt_relay_bin
  - platform: gpio
    pin: GPIO11              # K3 — chime suppress (open C1: P4↔CHIME_POS)
    id: suppress_chime_bin
  - platform: gpio
    pin: GPIO10              # DOOR_DRV — door pair: K2 bridges P2↔P3 (ÖT), K4 breaks the seal-in to
                             # drop the WF26 latch; K2's make is delayed ~38ms (Q3/RC) so the break
                             # leads on a freshly armed assertion. TODO.md tracks production command
                             # serialization, K1/K6 hand-off and the required 500ms low re-arm time.
    id: front_door_buzzer_bin

# Which greeting the auto-open reflex plays on the NEXT ring — HA primes this ahead of an expected
# delivery/guest. Options MUST stay in the same order as the greetings registry (esphome: on_boot).
select:
  - platform: template
    name: "Next-ring greeting"
    id: next_greeting
    icon: mdi:bullhorn
    optimistic: true
    restore_value: true
    options:
      - "None"
      - "Chime"
      - "Silent"
      - "Hello"
      - "Secret"
      - "Windows"
    initial_option: "None"

button:
  # Current V4.1-compatible direct pulse. Before V4.2 isolation is enabled, replace this and every
  # other production caller with the common door coordinator tracked in TODO.md.
  - platform: output
    name: "Front Door Buzzer"
    icon: mdi:lock-open-variant
    id: front_door_buzzer
    output: front_door_buzzer_bin
    duration: 1750ms
  - platform: template
    name: "Play Welcome Sound"
    icon: mdi:bullhorn
    id: play_welcome_button
    on_press:
      then:
        # Honor the HA-primed next_greeting select; None -> no playback.
        - script.execute: stage_selected_greeting
        - script.execute: play_welcome
  - platform: template
    name: "Welcome & Open Door"
    icon: mdi:door-open
    id: welcome_and_open_button
    on_press:
      then:
        # Honor the HA-primed next_greeting select (same staging as the ring reflex); None -> just open.
        - script.execute: stage_selected_greeting
        - script.execute: welcome_and_open

sensor:
  # R40/R41 divide the post-fuse +5 V rail by 11. C25 filters the ADC input. This
  # is useful for sag diagnostics, but cannot report a complete loss of board power.
  - platform: adc
    pin: GPIO5
    name: "Post-Fuse 5 V Supply"
    id: vbus_f_voltage
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    attenuation: 0db
    samples: 16
    update_interval: 10s
    accuracy_decimals: 2
    filters:
      - multiply: 11.0
  - platform: wifi_signal
    name: WiFi Signal Strength
    update_interval: 60s
