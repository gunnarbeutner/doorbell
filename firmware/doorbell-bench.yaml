# BENCH BRING-UP twin of doorbell.yaml (U1 = ESP32-S3-WROOM-1U-N16R8, U3 = ES8311).
# Tracks the production config's behaviour (welcome audio, greeting registry, name-based greet API,
# chime policy) but with bench deltas, all in service of VERIFICATION.md §5.5 (emulated-bus stages):
#   - Identity doorbell2 @ 192.168.3.78 (shares the api key + OTA password); production is doorbell @ .18.
#   - ALL homeassistant.event calls are stripped (a bench ring must not fire the real HA automations),
#     and with them the ring-triggered auto-open reflex — house/apartment sense is detection-only here.
#   - Two debug switches drive the SSR outputs with no user-facing switch: "Debug Chime Suppress" (K3)
#     and "Debug Door Drive Hold" (unpulsed K2+K4 — the Q3 watchdog still releases K2 after ~6.7 s).
#   - "Debug Test Tone": a continuous ~1 kHz sine on the DAC/TX path (scope it on P3 with PTT on).
#     NO microphone here: the mic (I2S RX) and speaker (I2S TX) share one half-duplex I2S bus, and a
#     declared mic holds the bus so the speaker can't start ("Parent bus is busy") — which breaks
#     welcome-audio playback. RX / the mic-loopback meter is dropped; verify audio with the scope.
#     The welcome-audio media_player and the tone share one speaker — use one at a time.
#
# GPIO map (S3-WROOM-1U; USB on the north edge, the ES8311 I2C/I2S bus ascending down the codec edge):
#   House Doorbell     (OC1 / Türruf sense)        : GPIO12
#   Apartment Doorbell (OC2 / Etagenruf sense)     : GPIO13
#   front_door_buzzer  (DOOR_DRV → K2+K4 door pair) : GPIO10
#   suppress_chime_bin (K3 / chime suppress)       : GPIO11
#   K1                 (PTT SSR, talk=energised)   : GPIO9
#   status LED          (active-low D6)             : GPIO7
#   I2C_SDA  (ES8311 control)                      : GPIO38
#   I2C_SCL  (ES8311 control)                      : GPIO39
#   I2S_MCLK (master clock)                        : GPIO40
#   I2S_BCLK (bit clock, SCLK)                     : GPIO41
#   I2S_DIN  (capture, ASDOUT)                     : GPIO42
#   I2S_WS   (LRCK)                                : GPIO2
#   I2S_DOUT (DAC / playback, DSDIN)               : GPIO1
#   logger                                         : native USB-Serial-JTAG (GPIO19/GPIO20 = USB D-/D+)
# The ES8311 bus is ordered ascending by module pad — SDA,SCL,MCLK,BCLK,DIN on GPIO38-42, then WS,DOUT
# on GPIO2/GPIO1 — so it fans out down U1's codec edge with no crossings, matching U3's pin sequence.
# The three SSR gates (GPIO9/10/11) and two sense optos (GPIO12/13) run ascending along the bus-side
# edge. BOOT is GPIO0 (boot strap + SW1); EN is the module's dedicated EN pin (SW2). The S3 is dual-core
# with 16 MB flash + 8 MB PSRAM (audio buffers live in PSRAM). Native USB-Serial-JTAG = flashing + logs.
#
# SSR gate outputs are ACTIVE-HIGH (see the output section): GPIO HIGH -> SSR LED on -> contact made.
#
# Sense disambiguation for the V4 sense points:
#   - OC2 taps the speaker pair (P5↔P1) and pulses at audio rate on ANY loud speaker audio
#     (floor tone, door gong, speech). Its filter chain stretches the half-cycle pulses into a
#     level (delayed_off before delayed_on) and is masked by house_doorbell / PTT — see the sensor.
#   - OC1 (line 4 / Türruf) needs no PTT mask: the board's talk handshake bridges P2↔P3 only
#     (K1: P2↔TALK_BRIDGE + TX_OUT↔P3), so energising K1 never reaches line 4. Debounce only.
#
# The two configs use separate build dirs (different device names), so no `esphome clean` is needed
# between them; flash the production doorbell.yaml before the board goes in the wall. Keep this in
# sync with doorbell.yaml — it is a copy of it plus the bench deltas listed above.

esphome:
  name: doorbell2
  on_boot:
    # Greeting registry — index-aligned with the `next_greeting` select options. The greet /
    # greet_and_open api actions resolve a greeting NAME to an index via the select (index_of), so the
    # select's option order is authoritative. Index 0 = None (nullptr = "just open, no door audio"); add
    # greetings after it in the SAME order as the select options. Keeps file choice branch-free
    # (index -> AudioFile*); adding a greeting = one files: entry + one push_back + one select option.
    priority: -100
    then:
      - lambda: |-
          id(greetings).push_back(nullptr);            // 0 = None
          id(greetings).push_back(id(welcome_chime));  // 1 = Chime
          id(greetings).push_back(id(welcome_silent)); // 2 = Silent (10 s inaudible timing test)
          id(greetings).push_back(id(welcome_hello));  // 3 = Hello
          id(greetings).push_back(id(welcome_secret)); // 4 = Secret
          id(greetings).push_back(id(welcome_windows));// 5 = Windows
          // Registry integrity: the vector and the next_greeting select options are index-aligned by
          // hand — flag a forgotten push_back / option at boot instead of silently playing the wrong
          // (or no) greeting later.
          if (id(greetings).size() != id(next_greeting).traits.get_options().size())
            ESP_LOGE("greetings", "registry/select length mismatch: %u vs %u",
                     (unsigned) id(greetings).size(),
                     (unsigned) id(next_greeting).traits.get_options().size());
      # POP TEST (bench): enable the ES8311 DAC soft-ramp to fade the DAC in/out and suppress the
      # enable/mute "pop" on P3. ESPHome's codec init leaves REG0x37 at 0x08 (DAC_RAMPRATE = 0 =
      # softramp disabled); 0x48 keeps the low nibble and sets DAC_RAMPRATE = 4 (0.25 dB / 32 LRCK).
      # REG37 is written only at codec setup(), so this override sticks. The delay lets setup() finish.
      - delay: 1s
      - lambda: |-
          uint8_t reg37[2] = {0x37, 0x48};
          id(codec_i2c)->write(0x18, reg37, 2);
          ESP_LOGI("es8311", "DAC soft-ramp enabled (REG0x37 = 0x48)");

esp32:
  board: esp32-s3-devkitc-1     # generic ESP32-S3 board def; U1 = ESP32-S3-WROOM-1U-N16R8
  variant: esp32s3
  flash_size: 16MB              # N16R8 module = 16 MB flash
  framework:
    type: esp-idf

psram:
  mode: octal                   # N16R8 = 8 MB octal PSRAM — audio buffers live here, off the 512 KB SRAM
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG   # logs over the native USB service connection (no UART pins are broken out)

status_led:
  pin:
    number: GPIO7
    inverted: true              # D6 anode is fed from +3V3; sinking IO7 lights it

api:
  encryption:
    key: !secret api_encryption_key
  # Immediate, HA-driven greeting/open. `greeting` is a greeting NAME matching a next_greeting select
  # option ("None"/"Chime"/"Silent"/"Hello"/"Secret"/"Windows", case-sensitive) — the select's
  # option list IS the name
  # registry, so index_of resolves name -> greetings[]. Unknown/empty name -> None (no door audio; the
  # door still opens for greet_and_open). HA maps a trigger type (parcel/food/guest/arrival) -> a name.
  actions:
    - action: greet
      variables:
        greeting: string
      then:
        - lambda: |-
            auto idx = id(next_greeting)->index_of(greeting);
            id(welcome_file) = (idx.has_value() && idx.value() < id(greetings).size())
                                 ? id(greetings)[idx.value()] : nullptr;
            if (!idx.has_value())
              ESP_LOGW("greet", "unknown greeting '%s' — no audio", greeting.c_str());
        - script.execute: play_welcome
    - action: greet_and_open
      variables:
        greeting: string
      then:
        - lambda: |-
            auto idx = id(next_greeting)->index_of(greeting);
            id(welcome_file) = (idx.has_value() && idx.value() < id(greetings).size())
                                 ? id(greetings)[idx.value()] : nullptr;
            if (!idx.has_value())
              ESP_LOGW("greet", "unknown greeting '%s' — opening with no audio", greeting.c_str());
        - script.execute: welcome_and_open

web_server:
  port: 80
  ota: false
  local: true

ota:
  platform: esphome
  password: !secret ota_password

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: "none"

  manual_ip:
    static_ip: 192.168.3.78
    gateway: 192.168.3.1
    subnet: 255.255.255.0
    dns1: 192.168.3.53

i2c:
  id: codec_i2c            # referenced by the on_boot DAC soft-ramp override (REG0x37)
  sda: GPIO38              # I2C_SDA — ES8311 (U3) control bus
  scl: GPIO39              # I2C_SCL — ES8311 (U3) control bus
  scan: false

i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO2    # I2S_WS / LRCK
  i2s_bclk_pin: GPIO41    # I2S_BCLK / SCLK
  i2s_mclk_pin: GPIO40    # I2S_MCLK

audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18          # CE → R20 (10k) → GND on U3 → I2C addr 0x18
    use_microphone: false  # MUST be false for the analog MIC1P/MIC1N inputs: this option selects a
                           # PDM DIGITAL mic (REG14 DMIC_ON) — true switches the ADC away from the
                           # analog PGA and yields pure digital silence. The analog ADC path is
                           # configured unconditionally by the driver.
    mic_gain: 0DB          # the input divider (R30/R31 22k + R32/R33 3.3k→VMID, ~-18dB) already drops the bus; the PGA can't attenuate anyway
                           # audio (gong peaks > 2Vrms full-scale) — keep all the headroom

speaker:
  - platform: i2s_audio
    id: intercom_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_codec
    i2s_dout_pin: GPIO1    # I2S_DOUT / DSDIN (ESP→codec, playback)

# NOTE: no `microphone:` here (nor in prod). The mic (I2S RX) and the speaker (I2S TX) share one
# half-duplex I2S bus; a declared mic holds the bus and makes the speaker fail to start ("Parent bus
# is busy"), which breaks welcome-audio playback. The RX path / loopback meter is dropped — scope the
# TX node for audio verification. Re-add the mic only together with a coordinator (voice_assistant).

# Media player wrapping the codec speaker: carries the embedded welcome chime (and any HA
# TTS/audio). With PTT engaged the audio rides the TX path to the bus/door station.
media_player:
  - platform: speaker
    id: intercom_media
    name: "Intercom"
    announcement_pipeline:
      speaker: intercom_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    # Greeting files — the single spot for embedding audio into the image. Keep each SHORT (a few
    # seconds): the buzzer is sequenced AFTER the welcome, so a file's length adds to door-open
    # latency and must finish within play_welcome's 30 s wait_until ceiling. Add one: new id here,
    # then have a caller stage it (`id(welcome_file) = id(<new_id>)`) — no branching; play_welcome
    # plays whatever pointer is staged, via C++ play_file().
    files:
      - id: welcome_chime
        file: "sounds/welcome-chime.wav"   # 16 kHz mono, peak -3 dBFS
      - id: welcome_silent
        file: "sounds/welcome-silent.wav"  # 10 s digital silence — exercises greet/open timing inaudibly
      - id: welcome_hello
        file: "sounds/weird_hello.wav"      # 16 kHz mono, peak -3 dBFS
      - id: welcome_secret
        file: "sounds/secret.wav"          # 1.36 s Zelda "secret" chime, leading silence trimmed
      - id: welcome_windows
        file: "sounds/windows.wav"         # 6.14 s Windows sound, leading silence trimmed, peak -3 dBFS
    # K1 (off-hook handshake + TX route to the bus) and the welcome_playing gong-mute FOLLOW the
    # player's playback state — engage while announcing/playing, release when idle/paused. Event-driven
    # so K1 can't be dropped mid-play by a transient IDLE blip (the earlier bug where play_welcome
    # raised K1 explicitly and the pre-announcement IDLE blip's backstop tore it back down). At idle K1
    # is already off, so the startup IDLE blip is a no-op; on_announcement then raises it for the audio.
    on_announcement:
      - logger.log: { format: "media_player ANNOUNCING -> K1 on", level: INFO, tag: mp }
      - switch.turn_on: intercom_ptt
      - globals.set: { id: welcome_playing, value: "true" }
    on_play:
      - logger.log: { format: "media_player PLAYING -> K1 on", level: INFO, tag: mp }
      - switch.turn_on: intercom_ptt
      - globals.set: { id: welcome_playing, value: "true" }
    on_idle:
      - logger.log: { format: "media_player IDLE -> K1 off", level: INFO, tag: mp }
      - switch.turn_off: intercom_ptt
      - globals.set: { id: welcome_playing, value: "false" }
    on_pause:
      - logger.log: { format: "media_player PAUSED -> K1 off", level: INFO, tag: mp }
      - switch.turn_off: intercom_ptt
      - globals.set: { id: welcome_playing, value: "false" }

globals:
  - id: welcome_playing
    type: bool
    restore_value: no
    initial_value: "false"
  # The greeting to play — a pointer into the media_player's files: (the single embed spot). A caller
  # stages it (`id(welcome_file) = id(<file>)`) before running play_welcome; nullptr = play nothing
  # (the default). This is what lets file choice avoid any name-branching in the script.
  - id: welcome_file
    type: audio::AudioFile*
    restore_value: no
    initial_value: "nullptr"
  # Greeting registry, populated in esphome: on_boot (see there). Index-aligned with the
  # `next_greeting` select; the greet/greet_and_open api actions resolve a name to an index via the
  # select (index_of). greetings[0] = nullptr (None).
  - id: greetings
    type: std::vector<audio::AudioFile*>
    restore_value: no
  # Earliest time a ring-triggered welcome may start. Keep the bench twin aligned with V4.1
  # production timing: the door station suppresses initial TX until ~1.45 s after a Türruf. Manual/API
  # greetings with no recent ring see an expired deadline and start immediately.
  - id: welcome_not_before_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  # Minimum ring→open deadline. A greeting always finishes and K1 settles first, so long greetings
  # extend the actual delay rather than being truncated or overlapped with K2.
  - id: ring_open_not_before_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  # OC1 starts with the Türruf and stays high for the K5-sealed session. Keep K3 open through the
  # measured ~3.9 s gong, then release it so the stock WF26 transducer works during the call.
  - id: gong_mute_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

# Door-station playback: play the embedded file, blocking until it finishes. K1 (off-hook handshake +
# TX route) and the K3 gong-mute (welcome_playing) follow the player state via the media_player
# on_announcement/on_idle triggers, not this script. Also the instrument for the AUDIO-2/AUDIO-6
# TX-reach test — trigger from the HA app while standing at the door station.
script:
  - id: play_welcome
    mode: single
    then:
      # Resolve and log the actual staged pointer here, at the common playback entry point, so the
      # trace covers select-driven buttons and both API actions. Include the embedded byte length to
      # distinguish a correct selection from a stale/wrong AudioFile even when no sound is heard.
      - lambda: |-
          auto *file = id(welcome_file);
          if (file == nullptr) {
            ESP_LOGI("greet", "welcome selected: None (no audio)");
          } else {
            const auto &options = id(next_greeting).traits.get_options();
            const char *name = "unregistered";
            for (size_t i = 0; i < id(greetings).size(); ++i) {
              if (id(greetings)[i] == file) {
                if (i < options.size()) name = options[i];
                break;
              }
            }
            ESP_LOGI("greet", "welcome selected: %s (%u bytes)", name, (unsigned) file->length);
          }
      # No file staged (welcome_file == nullptr, e.g. next_greeting = None) -> do nothing at all: no K1
      # handshake, no wait. That lets welcome_and_open open promptly when there is no greeting.
      - if:
          condition:
            lambda: 'return id(welcome_file) != nullptr;'
          then:
            # Defer ring-triggered TX until the measured V4.1 door-station suppression has ended.
            # Greeting assets have no leading padding except the intentionally all-silent test file.
            - delay: !lambda |-
                uint32_t remaining = id(welcome_not_before_ms) - millis();
                return remaining <= 5000 ? remaining : 0;
            - media_player.volume_set:
                id: intercom_media
                volume: 75%                 # = 0 dB, the clean ceiling — above this is digital gain (clips)
            # Play the staged file as an announcement. K1 (TX route) and the welcome_playing gong-mute
            # are NOT managed here — they follow the media_player state via on_announcement/on_idle (see
            # the media_player triggers). This script only SEQUENCES: play, then block until the
            # announcement ends, so welcome_and_open opens after K1 has released (K2 must not short the
            # TX tail). play_file uses the C++ speaker API — no name-branching; files: is the one embed.
            - lambda: 'id(intercom_media).play_file(id(welcome_file), true, false);'
            # Wait for the announcement to START (5 s also covers the i2s "bus busy" ~1 s retry), settle
            # 400 ms past the ANNOUNCING startup blip, then wait for the real END. Timeouts are backstops.
            - wait_until:
                condition:
                  media_player.is_announcing: intercom_media
                timeout: 5s
            - delay: 400ms
            - wait_until:
                condition:
                  not:
                    media_player.is_announcing: intercom_media
                timeout: 30s

  # Greet, THEN open the door — strictly sequential, never concurrent: K1 (TX) must be fully
  # released before the buzzer's K2 bridges P2↔P3, or K2 shorts out the audio tail. play_welcome
  # ends with K1 off; script.wait blocks until it finishes, then a short settle before the door
  # bridge makes. (For a short greeting only — see the length cap on files: above.)
  - id: welcome_and_open
    mode: single
    then:
      - script.execute: play_welcome    # plays whatever the caller staged in welcome_file (no-op if nullptr)
      - script.wait: play_welcome
      # Settle K1, then honour the 1.75 s minimum ring→open deadline. An expired/no-ring deadline adds
      # no delay; a long greeting still completes before the door bridge makes.
      - delay: 100ms
      - delay: !lambda |-
          uint32_t remaining = id(ring_open_not_before_ms) - millis();
          return remaining <= 5000 ? remaining : 0;
      - button.press: front_door_buzzer

  # Stage the HA-primed greeting (next_greeting select) into welcome_file. Single-lambda -> runs
  # synchronously, so a caller can read welcome_file immediately after script.execute. Shared by the
  # ring reflex and the "Welcome & Open Door" button. None / out-of-range -> nullptr (no door audio).
  - id: stage_selected_greeting
    then:
      - lambda: |-
          auto idx = id(next_greeting).active_index();
          id(welcome_file) = (idx.has_value() && idx.value() < id(greetings).size())
                               ? id(greetings)[idx.value()] : nullptr;

# Bench loopback tone: while "Debug Test Tone" is on, top up the speaker ring buffer every 50 ms with
# a phase-continuous ~1 kHz sine (advancing phase only by samples actually accepted — no boundary
# clicks). fs assumes the default 16 kHz I2S rate; a different rate just shifts the pitch, irrelevant
# for a level test. Shares intercom_speaker with the welcome-audio media_player — use one at a time.
interval:
  - interval: 50ms
    then:
      - lambda: |-
          if (!id(debug_test_tone).state) return;
          static double phase = 0.0;
          const double fs = 16000.0;
          const double tone_hz = 1000.0;
          const double amp = 0.5;                       // -6 dBFS — headroom, never clips the DAC
          const double TWO_PI = 6.283185307179586;
          const double dphase = TWO_PI * tone_hz / fs;
          int16_t block[512];
          while (true) {
            double ph = phase;
            for (int i = 0; i < 512; i++) {
              double v = amp * 32767.0 * sin(ph);
              block[i] = (int16_t) (v >= 0.0 ? v + 0.5 : v - 0.5);
              ph += dphase;
            }
            size_t wrote = id(intercom_speaker).play((const uint8_t *) block, sizeof(block));
            size_t accepted = wrote / 2;
            phase += dphase * (double) accepted;
            while (phase >= TWO_PI) phase -= TWO_PI;
            if (accepted < 512) break;                  // ring buffer full — resume next tick
          }

# Optional: BLE works but uses resources. Remove this and esp32_ble_tracker if you don't
# use the Bluetooth proxy.
bluetooth_proxy:
  active: false

esp32_ble_tracker:
  scan_parameters:
    active: False

binary_sensor:
  - platform: gpio
    name: "Apartment Doorbell"
    icon: mdi:doorbell
    id: apartment_doorbell
    pin:
      number: GPIO13           # OC2 collector — Etagenruf (P5) sense
      inverted: true           # opto pulls the pin LOW when the bell rings
      mode:
        input: true            # R23 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC2 sits across the speaker pair (P5<->P1), so it pulses on ANY loud speaker
      # audio: the Etagenruf tone, the Türruf 3-Klang gong and PTT speech alike.
      # Only report a floor call when no house ring (gong) and no PTT (speech)
      # explains the audio. All masked sources are AC, so the raw input keeps toggling
      # and this filter re-evaluates continuously while masked.
      - lambda: |-
          if (id(house_doorbell).state || id(intercom_ptt).state) return false;
          return x;
      # The tone reaches the opto only on positive half-cycles above the LED threshold,
      # so the raw input toggles at audio rate (~1ms low / ~1.4ms high) — a plain
      # delayed_on can never latch on it. Stretch the conduction pulses into a
      # continuous level first, then require that to persist. 150ms also outlasts
      # house_doorbell's 50ms latch, so a gong that starts together with a house ring
      # cannot beat the mask above.
      - delayed_off: 50ms      # bridge the gaps between tone half-cycles
      - delayed_on: 150ms      # require a sustained tone, and let house_doorbell latch first
      - delayed_off: 2s
    # bench: no on_press — the production HA event (doorbell_apartment) is stripped here
  - platform: gpio
    name: "House Doorbell"
    icon: mdi:doorbell
    id: house_doorbell
    pin:
      number: GPIO12           # OC1 collector — Türruf (line 4 / P4) sense
      inverted: true
      mode:
        input: true            # R22 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC1 senses the Türruf DC on line 4 (P4). The board's PTT bridges P2↔P3 only (K1: P2↔TALK_BRIDGE
      # + TX_OUT↔P3), so energising K1 cannot couple onto line 4 — no PTT mask needed. Debounce only:
      - delayed_on: 50ms
      - delayed_off: 2s
    on_press:
      then:
        # Stamp the same independent audio/open deadlines as production. The production HA events and
        # ring-triggered auto-open reflex stay stripped here; exercise greet/open via buttons or API.
        - lambda: |-
            id(welcome_not_before_ms) = millis() + 1450;
            id(ring_open_not_before_ms) = millis() + 1750;
            id(gong_mute_until_ms) = millis() + 4200;
  - platform: template
    name: "Chime Enabled"
    id: chime_enabled
    icon: mdi:music-note
    lambda: |-
      // K3 (NC SSR) opens C1 to mute the front-door gong. It sits in the C1 audio path (P4↔C1), NOT
      // in line 4 — so it does NOT break the session, and the board's codec RX/TX (on the speech pair,
      // lines 2/3) is independent of it. (It does mute the handset's own LS1 listen, which rides C1.)
      // OC1 rises with the Türruf and remains high for the K5-sealed session. Honour chime suppression
      // through the measured gong, then release K3 for the rest of the session so the stock WF26
      // transducer can listen/talk normally. OC1 alone cannot distinguish those two phases.
      if (id(welcome_playing)) return false;  // door-station playback: hold K3 = own speaker muted
      if (id(intercom_ptt).state) return true;
      if (id(house_doorbell).state && id(gong_mute_until_ms) != 0 &&
          static_cast<int32_t>(millis() - id(gong_mute_until_ms)) >= 0)
        return true;
      // The gong is suppressed by default (rings are announced via Alexa). Fail SAFE to ring so a
      // doorbell is never silently missed: suppress ONLY while HA is connected AND actively requests
      // it. HA clears suppress_chime when the announcement path is down (internet/Alexa), and a
      // disconnected HA drops ha_connected -> either way the gong rings. force_chime is the manual
      // override that forces the gong on regardless.
      return id(force_chime).state || !(id(suppress_chime).state && id(ha_connected).state);
    on_press:
      then:
        # State went true ("let it ring"): drop K3 so the gong's C1 path is closed (the gong rings).
        # K3 (the C1 mute) and K1 (the talk handshake) are independent — no inter-SSR timing
        # constraint, and K3 never makes a P2↔P3 short.
        - output.turn_off: suppress_chime_bin   # K3 off -> C1 closed -> gong rings
    on_release:
      then:
        - output.turn_on: suppress_chime_bin    # K3 on -> C1 open -> silence the gong
  # API connectivity — the failsafe gate for chime suppression. When the HA API link drops this goes
  # off, so the suppress lambda above can no longer mute the gong (it rings). No specific HA entity.
  - platform: status
    name: "HA Connected"
    id: ha_connected
    entity_category: diagnostic

switch:
  - platform: output
    name: "Intercom PTT"
    icon: mdi:phone-outgoing
    id: intercom_ptt
    output: ptt_relay_bin
    restore_mode: ALWAYS_OFF   # boot into listen/idle (K1 de-energised = talk strap open)
    on_turn_on:
      - logger.log: { format: "PTT ENGAGED  (K1 on)",  level: INFO, tag: ptt }
    on_turn_off:
      - logger.log: { format: "PTT DISENGAGED (K1 off)", level: INFO, tag: ptt }
  - platform: template
    name: "Auto-open front door"
    icon: mdi:gate
    id: auto_open_front_door
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Force Chime"
    icon: mdi:bell-ring
    id: force_chime
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  # HA-driven chime-suppression REQUEST (the occupancy / quiet-hours policy lives in HA). Only honoured
  # while the API is connected (see the chime_enabled lambda) — a dead HA can't leave the gong
  # muted. Default off = don't suppress.
  - platform: template
    name: "Suppress Chime"
    icon: mdi:bell-off
    id: suppress_chime
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  # Bench diagnostics (SAFE-6 / Stage-2c): direct drives for the two SSR outputs with no user-facing
  # switch of their own. Only this bench config carries them — the door-hold switch bypasses the
  # 1.75 s button pulse (the Q3 watchdog still releases K2 after ~6.7 s; K4 stays open while held).
  - platform: output
    name: "Debug Chime Suppress"
    icon: mdi:bug
    id: debug_chime_suppress
    entity_category: diagnostic
    output: suppress_chime_bin
    restore_mode: ALWAYS_OFF
  - platform: output
    name: "Debug Door Drive Hold"
    icon: mdi:bug
    id: debug_door_drive_hold
    entity_category: diagnostic
    output: front_door_buzzer_bin
    restore_mode: ALWAYS_OFF
  # Bench tone source — a ~1 kHz sine on the DAC/TX path. Engage "Intercom PTT" so K1 puts it on P2/P3;
  # scope the TX node (mic loopback is gone — the half-duplex bus can't play + capture at once anyway).
  - platform: template
    name: "Debug Test Tone"
    icon: mdi:sine-wave
    id: debug_test_tone
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_off_action:
      - speaker.stop: intercom_speaker
  # POP A/B: flip the ES8311 DAC soft-ramp live so we can scope P3 with it off vs on in one session.
  # ON  -> REG0x37 = 0x48 (DAC_RAMPRATE 4, ramp enabled); OFF -> 0x08 (ESPHome default, ramp disabled).
  # Boot default is ON (the on_boot override); toggle OFF to capture the "before" pop.
  - platform: template
    name: "Debug DAC Softramp"
    id: debug_dac_softramp
    icon: mdi:tune-vertical
    entity_category: diagnostic
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: 'uint8_t r[2] = {0x37, 0x48}; id(codec_i2c)->write(0x18, r, 2);'
    turn_off_action:
      - lambda: 'uint8_t r[2] = {0x37, 0x08}; id(codec_i2c)->write(0x18, r, 2);'

# *** IMPORTANT — the SSR gates are ACTIVE-HIGH, so these outputs are NOT inverted. ***
# Each SSR LED is driven from the GPIO through a 220 Ω series R (with a 10 k pull-down): GPIO HIGH ->
# LED on -> contact made, so `turn_on` drives the pin HIGH => no `inverted:` here. Adding
# `inverted: true` by mistake would energise BOTH at boot (door opener pulsing + chime force-
# suppressed) — exactly what the gate pull-downs are there to prevent.
output:
  - platform: gpio
    pin: GPIO9               # K1 — PTT SSR (energised = talk: P2↔TALK_BRIDGE handshake + TX_OUT↔P3 gate, codec→C14→R26→P3)
    id: ptt_relay_bin
  - platform: gpio
    pin: GPIO11              # K3 — chime suppress (open C1: P4↔CHIME_C1)
    id: suppress_chime_bin
  - platform: gpio
    pin: GPIO10              # DOOR_DRV — door pair: K2 bridges P2↔P3 (ÖT), K4 breaks the seal-in to
                             # drop the WF26 latch; K2's make is delayed ~38ms (Q3/RC) so the break
                             # leads = S1 break-before-make in hardware (no firmware sequencing)
    id: front_door_buzzer_bin

# Which greeting the autonomous auto-open reflex plays on the NEXT ring — HA primes this ahead of the
# expected delivery/guest. Options MUST stay in the same order as the greetings registry (esphome:
# on_boot); the greet/greet_and_open api actions resolve these option NAMES via index_of. Order:
# 0 = None (just open, no door audio), 1 = Chime, 2 = Silent (1.5 s inaudible — greet/open timing
# test), 3 = Hello, 4 = Secret, 5 = Windows.
select:
  - platform: template
    name: "Next-ring greeting"
    id: next_greeting
    icon: mdi:bullhorn
    optimistic: true
    restore_value: true
    options:
      - "None"
      - "Chime"
      - "Silent"
      - "Hello"
      - "Secret"
      - "Windows"
    initial_option: "None"

button:
  - platform: output
    name: "Front Door Buzzer"
    icon: mdi:lock-open-variant
    id: front_door_buzzer
    output: front_door_buzzer_bin
    duration: 1750ms
  - platform: template
    name: "Play Welcome Sound"
    icon: mdi:bullhorn
    id: play_welcome_button
    on_press:
      then:
        # Honor the HA-primed next_greeting select; None -> no playback.
        - script.execute: stage_selected_greeting
        - script.execute: play_welcome
  - platform: template
    name: "Welcome & Open Door"
    icon: mdi:door-open
    id: welcome_and_open_button
    on_press:
      then:
        # Honor the HA-primed next_greeting select (same staging as the ring reflex); None -> just open.
        - script.execute: stage_selected_greeting
        - script.execute: welcome_and_open

sensor:
  - platform: wifi_signal
    name: WiFi Signal Strength
    update_interval: 60s
