esphome:
  name: doorbell

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "REDACTED_API_KEY"

web_server:
  port: 80
  ota: false
  local: true

ota:
  platform: esphome
  password: "REDACTED_OTA_PASSWORD"

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: "none"

  manual_ip:
    static_ip: 192.168.3.18
    gateway: 192.168.3.1
    subnet: 255.255.255.0
    dns1: 192.168.3.53

bluetooth_proxy:
  active: false

esp32_ble_tracker:
  scan_parameters:
    active: False

binary_sensor:
  - platform: gpio
    name: "Apartment Doorbell"
    icon: mdi:doorbell
    pin:
      number: 32
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 25ms
      - delayed_off: 2s
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_apartment
  - platform: gpio
    name: "House Doorbell"
    icon: mdi:doorbell
    pin:
      number: 33
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 2s
    on_press:
      then:
        if:
          condition:
            binary_sensor.is_on: someone_at_house_door
          then:
            - homeassistant.event:
                event: esphome.doorbell_opened_arrival
            - delay: 1.75s
            - button.press: front_door_buzzer
          else:
            if:
              condition:
                switch.is_on: auto_open_front_door
              then:
                - homeassistant.event:
                    event: esphome.doorbell_opened
                - delay: 1.75s
                - button.press: front_door_buzzer
              else:
                - homeassistant.event:
                    event: esphome.doorbell_not_opened
  - platform: homeassistant
    id: apartment_occupancy
    entity_id: binary_sensor.apartment_occupancy
  - platform: homeassistant
    id: someone_at_house_door
    entity_id: binary_sensor.someone_at_house_door
  - platform: homeassistant
    id: internet_connection
    entity_id: binary_sensor.fritz_box_7590_connection
  - platform: template
    name: "Doorbell Sound"
    id: doorbell_sound_state
    icon: mdi:music-note
    lambda: |-
      return !id(internet_connection).state || (id(apartment_occupancy).state && !id(someone_at_house_door).state && id(doorbell_sound).state);
    on_press:
      then:
        - output.turn_off: suppress_doorbell_sound_bin
    on_release:
      then:
        - output.turn_on: suppress_doorbell_sound_bin

switch:
  - platform: template
    name: "Auto-open front door"
    icon: mdi:gate
    id: auto_open_front_door
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Doorbell Sound"
    icon: mdi:music-note
    id: doorbell_sound
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

output:
  - platform: gpio
    pin: 25
    id: suppress_doorbell_sound_bin
    inverted: true
  - platform: gpio
    pin: 26
    id: front_door_buzzer_bin
    inverted: true

button:
  - platform: output
    name: "Front Door Buzzer"
    icon: mdi:lock-open-variant
    id: front_door_buzzer
    output: front_door_buzzer_bin
    duration: 1750ms
  - platform: template
    name: "Phone Call"
    icon: mdi:phone
    id: phone_call
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_phone_call
        - button.press: front_door_buzzer
  - platform: template
    name: "Debug Doorbell Opened"
    icon: mdi:bug
    id: debug_doorbell_opened
    entity_category: diagnostic
    on_press:
      then:
        - homeassistant.event:
            event: esphome.doorbell_opened

sensor:
  - platform: wifi_signal
    name: WiFi Signal Strength
    update_interval: 60s
