# Klingel V4.0 — AVDD tone, WiFi-ON twin (proto1 board)  —  the "radio ON" half of the A/B
# =============================================================================================
# IDENTICAL to doorbell-v40-tone.yaml (same continuous tone, same codec/I2S/generator, same proto1
# pin map) EXCEPT the WiFi radio is brought up and kept actively transmitting. Flash this, capture
# the SAME FFT at the SAME probe point, and diff the broadband noise floor against the WiFi-off run.
# The delta is the WiFi-TX -> +3V3 -> AVDD coupling (the pre-fab review warning / CODEC_AVDD_REWORK).
#
# Everything that is NOT WiFi is held identical to the off twin so it cancels in the diff: the tone
# is the same 1 kHz-intended sine (it plays at ~336 Hz because the codec clocks at ~16 kHz, not 48 —
# a known, harmless-for-this-test mismatch), the transformer coloring / saturation harmonics / mains
# hum are the same. Only the radio changes.
#
# To make WiFi a STRONG, sustained aggressor (not just an idle-associated link): power_save_mode:none
# keeps the modem fully on, and api + web_server give live traffic. For the worst case, open the web
# UI (http://<device-ip>/) in a browser during the capture so it streams continuously => steady TX.
#
# Flash over USB (device may be off-network when you start):  esphome run firmware/doorbell-v40-tone-wifi.yaml
# Once it associates you can OTA between the two twins.        RESTORE: USB-flash the deploy config.

substitutions:
  tone_hz: "1000"        # desired OUTPUT tone frequency (Hz)
  tone_amp: "0.5"        # fraction of full scale (0.5 = -6 dBFS)
  sr: "48000"            # rate requested of codec + I2S (C6 actually clocks ~16.1 kHz regardless)
  gen_fs: "16113"        # MEASURED actual playback rate; generator calibrated to THIS so output = tone_hz.
                         # MUST match the off-twin's gen_fs so both runs emit the identical tone (A/B).

esphome:
  name: doorbell-v40-tone-wifi
  friendly_name: Doorbell V4.0 AVDD tone (WiFi on)

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO

# WiFi UP and kept hot — this is the ONLY difference from the off twin. power_save_mode:none holds the
# modem fully on for steady TX; AP fallback keeps the radio transmitting even if the home net is away.
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "doorbell-v40-tone"
    password: "REDACTED_AP_PASSWORD"

captive_portal:

# Live traffic sources so the radio actually transmits during the capture (open the web UI to stream).
api:
ota:
  - platform: esphome
web_server:
  port: 80
  local: true
  ota: false

i2c:
  sda: GPIO18                # I2C_SDA — ES8311 (U3) control bus   (proto1 pin)
  scl: GPIO19                # I2C_SCL — ES8311 (U3) control bus   (proto1 pin)
  scan: true

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO0     # I2S_WS / LRCK    (proto1 pin)
    i2s_bclk_pin: GPIO11     # I2S_BCLK / SCLK  (proto1 pin)
    i2s_mclk_pin: GPIO6      # I2S_MCLK         (proto1 pin)

audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18
    sample_rate: ${sr}
    use_microphone: false

speaker:
  - platform: i2s_audio
    id: intercom_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_codec
    sample_rate: ${sr}
    channel: mono
    timeout: never
    i2s_dout_pin: GPIO7      # I2S_DOUT / DSDIN (ESP->codec, playback)  (proto1 pin)

# Same continuous, phase-continuous sine generator as the off twin (kept byte-identical so it cancels).
interval:
  - interval: 50ms
    then:
      - lambda: |-
          static double phase = 0.0;
          const double fs = ${gen_fs};          // calibrated to the MEASURED playback rate, not sr
          const double tone_hz = ${tone_hz};
          const double amp = ${tone_amp};
          const double TWO_PI = 6.283185307179586;
          const double dphase = TWO_PI * tone_hz / fs;
          int16_t block[512];
          while (true) {
            double ph = phase;
            for (int i = 0; i < 512; i++) {
              double v = amp * 32767.0 * sin(ph);
              block[i] = (int16_t) (v >= 0.0 ? v + 0.5 : v - 0.5);
              ph += dphase;
            }
            size_t wrote = id(intercom_speaker).play((const uint8_t *) block, sizeof(block));
            size_t accepted = wrote / 2;
            phase += dphase * (double) accepted;
            while (phase >= TWO_PI) phase -= TWO_PI;
            if (accepted < 512) break;
          }
