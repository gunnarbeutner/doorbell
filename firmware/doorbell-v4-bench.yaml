# Klingel V4 — BENCH BRING-UP twin of doorbell-v4.yaml (same board, same device identity).
# Differences vs the production config, both in service of VERIFICATION.md §5.5 (emulated-bus
# bench stages):
#   - ALL homeassistant.event calls are stripped (bench rings/tests must not fire the real HA
#     automations), and with them the ring-triggered auto-open chain and the event-only buttons
#     ("Phone Call", "Debug Doorbell Opened").
#   - Two debug switches drive the SSR outputs that have no user-facing switch: "Debug Chime
#     Suppress" (K3) and "Debug Door Drive Hold" (unpulsed K2+K4 — the Q3 hardware watchdog still
#     releases K2 after ~6.7 s).
#   - Audio loopback instrumentation (2e without an external tone source): "Debug Test Tone"
#     streams a continuous ~1 kHz sine into the ES8311 DAC, "Debug Mic Capture" runs the ADC into
#     an RMS meter published as "Debug Mic Level" (dBFS). With PTT engaged, the tone rides
#     DAC → R26/C14 → TALK_BRIDGE → K1 → P2 → C16/RX divider → MIC1P → ADC, so a level jump proves
#     both analog audio paths end-to-end. voice_assistant is dropped here so it cannot contend
#     for the microphone.
# Flash the production doorbell-v4.yaml before the board goes in the wall. The two configs share
# one build dir (same device name): run `esphome clean` when switching between them, or the stale
# dependency graph fails the build.
#
# GPIO map (S3-WROOM-1U; USB on the north edge, the ES8311 I2C/I2S bus ascending down the codec edge):
#   House Doorbell     (OC1 / Türruf sense)        : GPIO12
#   Apartment Doorbell (OC2 / Etagenruf sense)     : GPIO13
#   front_door_buzzer  (DOOR_DRV → K2+K4 door pair) : GPIO10
#   suppress_sound     (K3 / chime suppress)       : GPIO11
#   K1                 (PTT SSR, talk=energised)   : GPIO9
#   I2C_SDA  (ES8311 control)                      : GPIO38
#   I2C_SCL  (ES8311 control)                      : GPIO39
#   I2S_MCLK (master clock)                        : GPIO40
#   I2S_BCLK (bit clock, SCLK)                     : GPIO41
#   I2S_DIN  (capture, ASDOUT)                     : GPIO42
#   I2S_WS   (LRCK)                                : GPIO2
#   I2S_DOUT (DAC / playback, DSDIN)               : GPIO1
#   logger                                         : native USB-Serial-JTAG (GPIO19/GPIO20 = USB D-/D+)
#
# SSR gate outputs are ACTIVE-HIGH (see the output section): GPIO HIGH -> SSR LED on -> contact made.
#
# Named doorbell2 @ 192.168.3.78 (same identity as the production config) so HA/web continuity
# holds across bench↔production reflashes; api key and OTA password are shared with V3.

esphome:
  name: doorbell2

esp32:
  board: esp32-s3-devkitc-1     # generic ESP32-S3 board def; U1 = ESP32-S3-WROOM-1U-N16R8
  variant: esp32s3
  flash_size: 16MB              # N16R8 module = 16 MB flash
  framework:
    type: esp-idf

psram:
  mode: octal                   # N16R8 = 8 MB octal PSRAM — audio buffers live here, off the 512 KB SRAM
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG   # logs over the native USB-C (no UART pins are broken out)

api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 80
  ota: false
  local: true

ota:
  platform: esphome
  password: !secret ota_password

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: "none"

  manual_ip:
    static_ip: 192.168.3.78
    gateway: 192.168.3.1
    subnet: 255.255.255.0
    dns1: 192.168.3.53

i2c:
  sda: GPIO38              # I2C_SDA — ES8311 (U3) control bus
  scl: GPIO39              # I2C_SCL — ES8311 (U3) control bus
  scan: false

i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO2    # I2S_WS / LRCK
  i2s_bclk_pin: GPIO41    # I2S_BCLK / SCLK
  i2s_mclk_pin: GPIO40    # I2S_MCLK

audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18          # CE → R20 (10k) → GND on U3 → I2C addr 0x18
    use_microphone: false  # MUST be false for the analog MIC1P/MIC1N inputs: this option selects a
                           # PDM DIGITAL mic (REG14 DMIC_ON) — true switches the ADC away from the
                           # analog PGA and yields pure digital silence. The analog ADC path is
                           # configured unconditionally by the driver.
    mic_gain: 0DB          # the input divider (R30/R31 22k + R32/R33 3.3k→VMID, ~-18dB) already drops the bus; the PGA can't attenuate anyway
                           # audio (gong peaks > 2Vrms full-scale) — keep all the headroom

speaker:
  - platform: i2s_audio
    id: intercom_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_codec
    i2s_dout_pin: GPIO1    # I2S_DOUT / DSDIN (ESP→codec, playback)

microphone:
  - platform: i2s_audio
    id: intercom_mic
    i2s_audio_id: i2s_bus
    adc_type: external     # ES8311 does the conversion; ESP only receives I2S
    i2s_din_pin: GPIO42    # I2S_DIN / ASDOUT (codec→ESP, capture)
    channel: left          # ES8311 mono ADC transmits in the LEFT I2S slot — the ESPHome default
    bits_per_sample: 16bit # (right, 32bit) reads the empty slot = perfect digital silence
    on_data:
      - lambda: |-
          // Block RMS → dBFS, published via the "Debug Mic Level" template sensor.
          const int16_t *s = (const int16_t *) x.data();
          const size_t n = x.size() / 2;
          if (n == 0) return;
          double acc = 0.0;
          for (size_t i = 0; i < n; i++) { const double v = s[i]; acc += v * v; }
          const double rms = sqrt(acc / (double) n);
          const float dbfs = 20.0 * log10((rms < 1.0 ? 1.0 : rms) / 32768.0);
          id(g_mic_dbfs) = dbfs;
          if (dbfs > id(g_mic_peak_dbfs)) id(g_mic_peak_dbfs) = dbfs;

# (voice_assistant is intentionally absent in the bench config — see header.)

globals:
  - id: g_mic_dbfs
    type: float
    restore_value: no
    initial_value: "-120.0"
  - id: g_mic_peak_dbfs
    type: float
    restore_value: no
    initial_value: "-120.0"

# Continuous phase-continuous sine generator: while
# "Debug Test Tone" is on, every 50 ms the speaker ring buffer is topped up with fresh samples,
# advancing a persistent phase only by the samples actually accepted — seamless, no boundary
# clicks. fs below assumes the default 16 kHz I2S rate; if the actual rate differs the tone just
# lands at a different pitch, which is irrelevant for a loopback level test.
interval:
  - interval: 50ms
    then:
      - lambda: |-
          if (!id(debug_test_tone).state) return;
          static double phase = 0.0;
          const double fs = 16000.0;
          const double tone_hz = 1000.0;
          const double amp = 0.5;                       // -6 dBFS — headroom, never clips the DAC
          const double TWO_PI = 6.283185307179586;
          const double dphase = TWO_PI * tone_hz / fs;
          int16_t block[512];
          while (true) {
            double ph = phase;
            for (int i = 0; i < 512; i++) {
              double v = amp * 32767.0 * sin(ph);
              block[i] = (int16_t) (v >= 0.0 ? v + 0.5 : v - 0.5);
              ph += dphase;
            }
            size_t wrote = id(intercom_speaker).play((const uint8_t *) block, sizeof(block));
            size_t accepted = wrote / 2;
            phase += dphase * (double) accepted;
            while (phase >= TWO_PI) phase -= TWO_PI;
            if (accepted < 512) break;                  // ring buffer full — resume next tick
          }

# Optional: BLE works but uses resources. Remove this and esp32_ble_tracker if you don't
# use the Bluetooth proxy.
bluetooth_proxy:
  active: false

esp32_ble_tracker:
  scan_parameters:
    active: False

binary_sensor:
  - platform: gpio
    name: "Apartment Doorbell"
    icon: mdi:doorbell
    id: apartment_doorbell
    pin:
      number: GPIO13           # OC2 collector — Etagenruf (P5) sense
      inverted: true           # opto pulls the pin LOW when the bell rings
      mode:
        input: true            # R23 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC2 sits across the speaker pair (P5<->P1), so it pulses on ANY loud speaker
      # audio: the Etagenruf tone, the Türruf 3-Klang gong and PTT speech alike.
      # Only report a floor call when no house ring (gong) and no PTT (speech)
      # explains the audio. All masked sources are AC, so the raw input keeps toggling
      # and this filter re-evaluates continuously while masked.
      - lambda: |-
          if (id(house_doorbell).state || id(intercom_ptt).state) return false;
          return x;
      # The tone reaches the opto only on positive half-cycles above the LED threshold,
      # so the raw input toggles at audio rate (~1ms low / ~1.4ms high) — a plain
      # delayed_on can never latch on it. Stretch the conduction pulses into a
      # continuous level first, then require that to persist. 150ms also outlasts
      # house_doorbell's 50ms latch, so a gong that starts together with a house ring
      # cannot beat the mask above.
      - delayed_off: 50ms      # bridge the gaps between tone half-cycles
      - delayed_on: 150ms      # require a sustained tone, and let house_doorbell latch first
      - delayed_off: 2s
    # bench: no on_press — the production HA event is stripped here
  - platform: gpio
    name: "House Doorbell"
    icon: mdi:doorbell
    id: house_doorbell
    pin:
      number: GPIO12           # OC1 collector — Türruf (line 4 / P4) sense
      inverted: true
      mode:
        input: true            # R22 (10k to +3V3) holds it HIGH at idle
    filters:
      # OC1 senses the Türruf DC on line 4 (P4). The board's PTT bridges P2↔P3 only (K1: P2↔TALK_BRIDGE
      # + TX_OUT↔P3), so energising K1 cannot couple onto line 4 — no PTT mask needed. Debounce only:
      - delayed_on: 50ms
      - delayed_off: 2s
    # bench: no on_press — the production HA events AND the ring-triggered auto-open are stripped here
  - platform: homeassistant
    id: apartment_occupancy
    entity_id: binary_sensor.apartment_occupancy
  - platform: homeassistant
    id: someone_at_house_door
    entity_id: binary_sensor.someone_at_house_door
  - platform: homeassistant
    id: internet_connection
    entity_id: binary_sensor.fritz_box_7590_connection
  - platform: template
    name: "Doorbell Sound"
    id: doorbell_sound_state
    icon: mdi:music-note
    lambda: |-
      // K3 (NC SSR) opens C1 to mute the front-door gong. It sits in the C1 audio path (P4↔C1), NOT
      // in line 4 — so it does NOT break the session, and the board's codec RX/TX (on the speech pair,
      // lines 2/3) is independent of it. (It does mute the handset's own LS1 listen, which rides C1.)
      // Current policy: keep K3 OFF while transmitting (PTT) — return true (= "let it ring", K3 off) —
      // and suppress only when idle and the conditions call for it.
      if (id(intercom_ptt).state) return true;
      return !id(internet_connection).state || (id(apartment_occupancy).state && !id(someone_at_house_door).state && id(doorbell_sound).state);
    on_press:
      then:
        # State went true ("let it ring"): drop K3 so the gong's C1 path is closed (the gong rings).
        - output.turn_off: suppress_doorbell_sound_bin   # K3 off -> C1 closed -> gong rings
    on_release:
      then:
        - output.turn_on: suppress_doorbell_sound_bin    # K3 on -> C1 open -> silence the gong

switch:
  - platform: output
    name: "Intercom PTT"
    icon: mdi:phone-outgoing
    id: intercom_ptt
    output: ptt_relay_bin
    restore_mode: ALWAYS_OFF   # boot into listen/idle (K1 de-energised = talk strap open)
  - platform: template
    name: "Auto-open front door"
    icon: mdi:gate
    id: auto_open_front_door
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Doorbell Sound"
    icon: mdi:music-note
    id: doorbell_sound
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  # Bench diagnostics (SAFE-6 / Stage-2c): direct drives for the two SSR outputs that have no
  # user-facing switch of their own. Only this bench config carries them — the door-hold switch
  # bypasses the 1.75 s button pulse (the Q3 hardware watchdog still releases K2 after ~6.7 s;
  # K4 stays open for as long as the switch is held).
  - platform: output
    name: "Debug Chime Suppress"
    icon: mdi:bug
    id: debug_chime_suppress
    entity_category: diagnostic
    output: suppress_doorbell_sound_bin
    restore_mode: ALWAYS_OFF
  - platform: output
    name: "Debug Door Drive Hold"
    icon: mdi:bug
    id: debug_door_drive_hold
    entity_category: diagnostic
    output: front_door_buzzer_bin
    restore_mode: ALWAYS_OFF
  # Audio loopback instrumentation — see header. Engage "Intercom PTT" so K1 puts the tone onto P2.
  - platform: template
    name: "Debug Test Tone"
    icon: mdi:sine-wave
    id: debug_test_tone
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_off_action:
      - speaker.stop: intercom_speaker
  - platform: template
    name: "Debug Mic Capture"
    icon: mdi:microphone
    id: debug_mic_capture
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - microphone.capture: intercom_mic
    turn_off_action:
      - microphone.stop_capture: intercom_mic

# *** IMPORTANT — the SSR gates are ACTIVE-HIGH, so these outputs are NOT inverted. ***
# Each SSR LED is driven from the GPIO through a 220 Ω series R (with a 10 k pull-down): GPIO HIGH ->
# LED on -> contact made, so `turn_on` drives the pin HIGH => no `inverted:` here. Adding
# `inverted: true` by mistake would energise BOTH at boot (door opener pulsing + chime force-
# suppressed) — exactly what the gate pull-downs are there to prevent.
output:
  - platform: gpio
    pin: GPIO9               # K1 — PTT SSR (energised = talk: P2↔TALK_BRIDGE handshake + TX_OUT↔P3 gate, codec→C14→R28→P3)
    id: ptt_relay_bin
  - platform: gpio
    pin: GPIO11              # K3 — chime suppress (open C1: P4↔CHIME_C1)
    id: suppress_doorbell_sound_bin
  - platform: gpio
    pin: GPIO10              # DOOR_DRV — door pair: K2 bridges P2↔P3 (ÖT), K4 breaks the seal-in to
                             # drop the WF26 latch; K2's make is delayed ~38ms (Q3/RC) so the break
                             # leads = S1 break-before-make in hardware (no firmware sequencing)
    id: front_door_buzzer_bin

button:
  - platform: output
    name: "Front Door Buzzer"
    icon: mdi:lock-open-variant
    id: front_door_buzzer
    output: front_door_buzzer_bin
    duration: 1750ms

sensor:
  - platform: wifi_signal
    name: WiFi Signal Strength
    update_interval: 60s
  - platform: template
    name: "Debug Mic Level"
    id: debug_mic_level
    unit_of_measurement: "dBFS"
    accuracy_decimals: 1
    update_interval: 1s
    entity_category: diagnostic
    lambda: return id(g_mic_dbfs);
  - platform: template
    name: "Debug Mic Peak"
    id: debug_mic_peak
    unit_of_measurement: "dBFS"
    accuracy_decimals: 1
    update_interval: 1s
    entity_category: diagnostic
    # peak block-RMS since the previous update (read-and-reset) — catches clicks between updates
    lambda: |-
      const float v = id(g_mic_peak_dbfs);
      id(g_mic_peak_dbfs) = -120.0f;
      return v;
